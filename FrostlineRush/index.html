<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Frostline Rush — Tyler's Games</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;700&display=swap');

  :root{
    --bg: #0B0E14;
    --panel: #151A24;
    --panel-line: #232A38;
    --accent: #2DE1C2;
    --accent2: #FF3864;
    --gold: #FFA33E;
    --text: #E8ECF1;
    --muted: #5B6472;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }

  html, body{
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
  }

  a{ color: var(--accent); }

  .wrap{
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 14px 14px 10px;
  }

  .topbar{
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    flex-shrink: 0;
  }

  .back{
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--muted);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .back:hover{ color: var(--accent); }

  .title{
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text);
    text-shadow: 0 0 10px rgba(45,225,194,0.35);
  }

  .stage{
    position: relative;
    width: min(480px, 100vw - 28px);
    aspect-ratio: 9 / 16;
    max-height: calc(100vh - 90px);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--panel-line);
    box-shadow: 0 0 0 1px #000, 0 20px 50px rgba(0,0,0,0.5);
    background: #9fd4ee;
  }

  canvas{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
    display: block;
  }

  .hud{
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    align-items: flex-end;
    z-index: 5;
    pointer-events: none;
  }

  .pill{
    position: relative;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    width: 84px;
    background: rgba(11,14,20,0.6);
    border: 1px solid rgba(255,255,255,0.14);
    backdrop-filter: blur(2px);
    border-radius: 8px;
    padding: 5px 10px 5px 24px;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    transition: box-shadow 0.2s ease;
  }
  .pill .icon{
    position: absolute;
    left: -13px;
    top: 50%;
    transform: translateY(-50%);
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: #1c2432;
    border: 2px solid rgba(255,255,255,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    line-height: 1;
  }
  .pill .val{ min-width: 14px; text-align: right; font-variant-numeric: tabular-nums; }
  .pill.flash{ box-shadow: 0 0 0 2px rgba(124,255,155,0.8), 0 0 14px rgba(124,255,155,0.6); }

  .logo{
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 5;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: #fff;
    text-shadow: -1px 0 #0b3550, 1px 0 #0b3550, 0 -1px #0b3550, 0 1px #0b3550;
    pointer-events: none;
    line-height: 1.5;
  }
  .logo span{ display:block; color: var(--gold); }

  .hint{
    position: absolute;
    left: 50%;
    top: 46%;
    transform: translate(-50%, -50%);
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: #fff;
    text-shadow: -1px 0 #000, 1px 0 #000, 0 -1px #000, 0 1px #000, 0 2px 4px rgba(0,0,0,0.4);
    z-index: 6;
    pointer-events: none;
    transition: opacity 0.5s ease;
    text-align: center;
    white-space: nowrap;
  }

  .toast{
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--muted);
    z-index: 5;
    letter-spacing: 0.5px;
    pointer-events: none;
  }

  footer{
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    flex-shrink: 0;
  }
  footer a{ color: var(--muted); }
</style>
</head>
<body>

<div class="wrap">
  <div class="topbar">
    <a class="back" href="../index.html">&larr; ARCADE</a>
    <div class="title">FROSTLINE RUSH</div>
  </div>

  <div class="stage" id="stage">
    <canvas id="game"></canvas>

    <div class="logo">FROSTLINE<span>RUSH</span></div>

    <div class="hud" id="hud">
      <div class="pill" id="pillCash"><span class="icon">💰</span><span class="val" id="valCash">0</span></div>
      <div class="pill" id="pillWood"><span class="icon">🪵</span><span class="val" id="valWood">0</span></div>
      <div class="pill" id="pillMeat"><span class="icon">🥩</span><span class="val" id="valMeat">0</span></div>
      <div class="pill" id="pillGold"><span class="icon">🪙</span><span class="val" id="valGold">0</span></div>
    </div>

    <div class="hint" id="hint">Swipe to move</div>
    <div class="toast" id="toast"></div>
  </div>

  <footer>drag anywhere on the ice to move &middot; chop, hunt &amp; mine, then haul it all back to camp</footer>
</div>

<script>
(function(){
  "use strict";

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');
  const hint = document.getElementById('hint');
  const toast = document.getElementById('toast');

  // Internal virtual resolution (portrait), scaled to fit the stage element.
  const VW = 480, VH = 853;
  let dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

  function resize(){
    const rect = stage.getBoundingClientRect();
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
  }
  window.addEventListener('resize', resize);
  resize();

  function scaleFactor(){
    return canvas.width / VW;
  }

  // ---------- Game state ----------
  const state = {
    cash: 0,
    started: false
  };
  const prevState = { cash: 0, wood: 0, meat: 0, gold: 0 };

  const player = {
    x: VW/2, y: 620, r: 16,
    vx: 0, vy: 0, speed: 185,
    facing: 1,
    moving: false,
    carry: { wood: 0, meat: 0, gold: 0 }
  };

  const RES_INFO = {
    wood: { icon:'🪵', tool:'🪓', color:'#8a5a2b', value: 3, stackDx: 0   },
    meat: { icon:'🥩', tool:'🔪', color:'#c94f4f', value: 5, stackDx: -17 },
    gold: { icon:'🪙', tool:'⛏️', color:'#e0a92e', value: 9, stackDx: 17  }
  };

  // Resource zones: player standing near one triggers a periodic "chop" that
  // scatters a pickup nearby; walking over the pickup collects it.
  const zones = [
    { type:'wood', cx: 120, cy: 225, chopR: 100, scatterR: 62, cooldown: 0.55, timer: 0, swing: 0 },
    { type:'meat', cx: 375, cy: 220, chopR: 95,  scatterR: 58, cooldown: 0.75, timer: 0, swing: 0 },
    { type:'gold', cx: 385, cy: 435, chopR: 85,  scatterR: 52, cooldown: 0.9,  timer: 0, swing: 0 }
  ];

  const depot = { x: 150, y: 470, r: 56 };

  const pickups = []; // {type,x,y,bob}

  // decorative idle queue of workers near depot
  const queue = [];
  for(let i=0;i<7;i++){
    queue.push({ x: 40 + (i%4)*26, y: 700 + Math.floor(i/4)*34, phase: Math.random()*Math.PI*2 });
  }

  const particles = []; // floating +text
  const snow = [];
  for(let i=0;i<50;i++){
    snow.push({ x: Math.random()*VW, y: Math.random()*VH, r: 1+Math.random()*2.2, s: 20+Math.random()*30, drift: (Math.random()-0.5)*20 });
  }

  const BOUND = { minX: 26, maxX: VW-26, minY: 150, maxY: VH-40 };

  // ---------- Input: floating joystick (swipe anywhere) ----------
  const stick = { active:false, ox:0, oy:0, dx:0, dy:0, id:null };
  const STICK_MAX = 46;
  const keys = {};

  function localPoint(clientX, clientY){
    const rect = canvas.getBoundingClientRect();
    const sx = VW / rect.width;
    const sy = VH / rect.height;
    return { x: (clientX - rect.left) * sx, y: (clientY - rect.top) * sy };
  }

  function onDown(clientX, clientY, id){
    const p = localPoint(clientX, clientY);
    stick.active = true;
    stick.ox = p.x; stick.oy = p.y;
    stick.dx = 0; stick.dy = 0;
    stick.id = id;
    if(!state.started){
      state.started = true;
      hint.style.opacity = '0';
    }
  }
  function onMove(clientX, clientY){
    if(!stick.active) return;
    const p = localPoint(clientX, clientY);
    let dx = p.x - stick.ox, dy = p.y - stick.oy;
    const d = Math.hypot(dx,dy);
    if(d > STICK_MAX){ dx = dx/d*STICK_MAX; dy = dy/d*STICK_MAX; }
    stick.dx = dx; stick.dy = dy;
  }
  function onUp(){
    stick.active = false;
    stick.dx = 0; stick.dy = 0;
  }

  canvas.addEventListener('pointerdown', e=>{ canvas.setPointerCapture(e.pointerId); onDown(e.clientX, e.clientY, e.pointerId); });
  canvas.addEventListener('pointermove', e=>{ if(e.pointerId === stick.id) onMove(e.clientX, e.clientY); });
  window.addEventListener('pointerup', e=>{ if(e.pointerId === stick.id) onUp(); });
  window.addEventListener('pointercancel', e=>{ if(e.pointerId === stick.id) onUp(); });

  window.addEventListener('keydown', e=>{ keys[e.key.toLowerCase()] = true; if(!state.started){ state.started=true; hint.style.opacity='0'; } });
  window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()] = false; });

  function inputVector(){
    let dx = 0, dy = 0;
    if(stick.active){
      dx = stick.dx / STICK_MAX;
      dy = stick.dy / STICK_MAX;
    } else {
      if(keys['arrowleft']||keys['a']) dx -= 1;
      if(keys['arrowright']||keys['d']) dx += 1;
      if(keys['arrowup']||keys['w']) dy -= 1;
      if(keys['arrowdown']||keys['s']) dy += 1;
      const d = Math.hypot(dx,dy);
      if(d>1){ dx/=d; dy/=d; }
    }
    return { dx, dy };
  }

  // ---------- Helpers ----------
  function addParticle(x,y,text,color){
    particles.push({ x, y, text, color, t:0, life: 0.9 });
  }
  function showToast(msg){
    toast.textContent = msg;
    toast.style.opacity = '1';
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>{ toast.style.opacity='0'; }, 1600);
  }

  function fmt(n){
    return n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n);
  }
  const hudEls = {
    cash: { val: document.getElementById('valCash'), pill: document.getElementById('pillCash') },
    wood: { val: document.getElementById('valWood'), pill: document.getElementById('pillWood') },
    meat: { val: document.getElementById('valMeat'), pill: document.getElementById('pillMeat') },
    gold: { val: document.getElementById('valGold'), pill: document.getElementById('pillGold') }
  };
  function flashPill(pill){
    pill.classList.add('flash');
    clearTimeout(pill._flashT);
    pill._flashT = setTimeout(()=> pill.classList.remove('flash'), 260);
  }
  function syncHud(){
    const cur = { cash: state.cash, wood: player.carry.wood, meat: player.carry.meat, gold: player.carry.gold };
    for(const key in cur){
      const el = hudEls[key];
      el.val.textContent = fmt(cur[key]);
      if(cur[key] > prevState[key]) flashPill(el.pill);
      prevState[key] = cur[key];
    }
  }
  syncHud();

  // ---------- Update ----------
  let last = performance.now();
  let depositCooldown = 0;

  function totalCarry(){
    return player.carry.wood + player.carry.meat + player.carry.gold;
  }

  function update(dt){
    // movement
    const { dx, dy } = inputVector();
    player.vx = dx * player.speed;
    player.vy = dy * player.speed;
    player.moving = (dx*dx + dy*dy) > 0.02;
    if(Math.abs(dx) > 0.05) player.facing = dx > 0 ? 1 : -1;

    player.x += player.vx * dt;
    player.y += player.vy * dt;
    player.x = Math.max(BOUND.minX, Math.min(BOUND.maxX, player.x));
    player.y = Math.max(BOUND.minY, Math.min(BOUND.maxY, player.y));

    // chopping/mining/hunting: player near a zone spawns scattered pickups over time
    zones.forEach(z=>{
      const d = Math.hypot(player.x-z.cx, player.y-z.cy);
      const near = d < z.chopR;
      if(z.swing > 0) z.swing -= dt;
      if(near){
        z.timer -= dt;
        if(z.timer <= 0){
          z.timer = z.cooldown;
          z.swing = 0.35;
          const ang = Math.random()*Math.PI*2;
          const rad = Math.random()*z.scatterR;
          pickups.push({
            type: z.type,
            x: Math.max(20, Math.min(VW-20, z.cx + Math.cos(ang)*rad)),
            y: Math.max(BOUND.minY-40, Math.min(BOUND.maxY, z.cy + Math.sin(ang)*rad)),
            bob: Math.random()*Math.PI*2
          });
        }
      } else {
        z.timer = Math.min(z.timer, z.cooldown * 0.5);
      }
    });

    // pickup collection
    for(let i=pickups.length-1;i>=0;i--){
      const p = pickups[i];
      const d = Math.hypot(player.x-p.x, player.y-p.y);
      if(d < player.r + 13){
        pickups.splice(i,1);
        player.carry[p.type]++;
        addParticle(player.x, player.y-30, RES_INFO[p.type].icon, RES_INFO[p.type].color);
        syncHud();
      }
    }

    // depositing at camp: sell whatever is carried for cash
    depositCooldown -= dt;
    if(depositCooldown <= 0){
      const d = Math.hypot(player.x-depot.x, player.y-depot.y);
      if(d < depot.r + player.r && totalCarry() > 0){
        const order = ['wood','meat','gold'];
        for(const type of order){
          if(player.carry[type] > 0){
            player.carry[type]--;
            const earned = RES_INFO[type].value;
            state.cash += earned;
            addParticle(depot.x + (Math.random()*30-15), depot.y-20, '+$'+earned, '#7CFF9B');
            depositCooldown = 0.14;
            syncHud();
            break;
          }
        }
      }
    }

    // particles
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.t += dt;
      if(p.t > p.life) particles.splice(i,1);
    }

    // snow
    snow.forEach(f=>{
      f.y += f.s * dt;
      f.x += f.drift * dt;
      if(f.y > VH){ f.y = -5; f.x = Math.random()*VW; }
    });
  }

  // ---------- Draw ----------
  function drawZone(z){
    ctx.save();
    ctx.translate(z.cx, z.cy);

    if(z.type === 'wood'){
      // pine tree cluster
      const trees = [[-46,-18],[0,-34],[46,-14],[-20,10],[26,16],[0,-4]];
      trees.forEach(([tx,ty], i)=>{
        ctx.save();
        ctx.translate(tx, ty);
        ctx.fillStyle = i%2===0 ? '#2f6d5a' : '#3a8069';
        for(let k=0;k<3;k++){
          ctx.beginPath();
          const w = 26 - k*6, yy = -k*11;
          ctx.moveTo(0, yy-16);
          ctx.lineTo(-w/2, yy+6);
          ctx.lineTo(w/2, yy+6);
          ctx.closePath();
          ctx.fill();
        }
        ctx.fillStyle = '#6b4a2c';
        ctx.fillRect(-3, 8, 6, 10);
        ctx.restore();
      });
    } else if(z.type === 'meat'){
      // fenced pen with a critter
      ctx.strokeStyle = '#8a5a2b';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.arc(0,0,60,0,Math.PI*2);
      ctx.setLineDash([16,10]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.ellipse(0,10,28,18,0,0,Math.PI*2);
      ctx.fillStyle = '#c9a071';
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(-24,4,10,9,0,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#3a2a1a';
      ctx.beginPath(); ctx.arc(-28,2,1.6,0,Math.PI*2); ctx.fill();
    } else if(z.type === 'gold'){
      // rocky outcrop
      const rocks = [[-30,10,26],[10,16,30],[34,-6,20],[-6,-14,22]];
      rocks.forEach(([rx,ry,rr])=>{
        ctx.beginPath();
        ctx.fillStyle = '#9aa3ad';
        ctx.arc(rx, ry, rr, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.beginPath();
        ctx.arc(rx-rr*0.3, ry-rr*0.3, rr*0.35, 0, Math.PI*2);
        ctx.fill();
      });
      ctx.fillStyle = '#e0c23e';
      ctx.font = '16px sans-serif';
      ctx.fillText('✨', -6, -20);
    }

    // big resource icon marker
    ctx.font = '26px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = 0.9;
    ctx.fillText(RES_INFO[z.type].icon, 0, z.type==='wood' ? 30 : 40);
    ctx.globalAlpha = 1;

    // chop cooldown progress ring (only when player is nearby & actively working)
    const near = Math.hypot(player.x-z.cx, player.y-z.cy) < z.chopR;
    if(near){
      const prog = 1 - Math.max(0, z.timer / z.cooldown);
      ctx.beginPath();
      ctx.arc(0, z.type==='wood'?30:40, 14, -Math.PI/2, -Math.PI/2 + prog*Math.PI*2);
      ctx.strokeStyle = 'rgba(255,255,255,0.85)';
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawPickup(p, t){
    const bobY = Math.sin(t*4 + p.bob) * 3;
    ctx.save();
    ctx.translate(p.x, p.y + bobY);
    ctx.beginPath();
    ctx.ellipse(0, 10, 10, 3.5, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fill();
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(RES_INFO[p.type].icon, 0, 0);
    ctx.restore();
  }

  function drawDepot(){
    ctx.save();
    ctx.translate(depot.x, depot.y);
    ctx.beginPath();
    ctx.arc(0,0,depot.r,0,Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 3;
    ctx.setLineDash([6,6]);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.beginPath();
    ctx.arc(0,0,depot.r-10,0,Math.PI*2);
    ctx.fillStyle = 'rgba(90,150,70,0.28)';
    ctx.fill();

    ctx.font = '38px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('💰', 0, 6);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px Space Grotesk, sans-serif';
    ctx.fillText('CAMP', 0, depot.r+16);
    ctx.restore();
  }

  function drawWorker(x, y, facing, bob, hooded){
    ctx.save();
    ctx.translate(x, y + bob);
    // shadow
    ctx.beginPath();
    ctx.ellipse(0, 16, 14, 5, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fill();

    // body
    ctx.beginPath();
    ctx.ellipse(0, 4, 11, 14, 0, 0, Math.PI*2);
    ctx.fillStyle = hooded ? '#3f7fd1' : '#4a9bd8';
    ctx.fill();

    // head
    ctx.beginPath();
    ctx.arc(0, -13, 9, 0, Math.PI*2);
    ctx.fillStyle = '#e9c9a3';
    ctx.fill();

    // hood
    ctx.beginPath();
    ctx.arc(0, -13, 10, Math.PI*0.15, Math.PI*0.95, false);
    ctx.strokeStyle = '#2c5faf';
    ctx.lineWidth = 6;
    ctx.stroke();

    // face dot
    ctx.beginPath();
    ctx.arc(facing*2.5, -13, 1.6, 0, Math.PI*2);
    ctx.fillStyle = '#2a2a2a';
    ctx.fill();

    ctx.restore();
  }

  function drawCarryStacks(t){
    ['wood','meat','gold'].forEach(type=>{
      const n = player.carry[type];
      if(n<=0) return;
      const info = RES_INFO[type];
      const shown = Math.min(n, 10);
      ctx.font = '15px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for(let i=0;i<shown;i++){
        const px = player.x + info.stackDx + (type==='wood' ? Math.sin(i*1.3)*2 : 0);
        const py = player.y - 28 - i*11;
        ctx.fillText(info.icon, px, py);
      }
      if(n > shown){
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px Space Grotesk, sans-serif';
        ctx.fillText('+'+(n-shown), player.x + info.stackDx, player.y - 28 - shown*11 - 12);
      }
    });
  }

  function drawChopTool(t){
    zones.forEach(z=>{
      if(z.swing <= 0) return;
      const near = Math.hypot(player.x-z.cx, player.y-z.cy) < z.chopR;
      if(!near) return;
      const prog = 1 - (z.swing / 0.35);
      const ang = Math.sin(prog*Math.PI) * 0.9 * (player.facing>=0?1:-1);
      ctx.save();
      ctx.translate(player.x + player.facing*18, player.y - 6);
      ctx.rotate(ang);
      ctx.font = '22px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(RES_INFO[z.type].tool, 0, 0);
      ctx.restore();
    });
  }

  function drawMoveArrow(t){
    if(!player.moving) return;
    const len = Math.hypot(player.vx, player.vy);
    if(len < 1) return;
    const ux = player.vx/len, uy = player.vy/len;
    const bob = Math.sin(t*10)*2;
    const ax = player.x + ux*30, ay = player.y + uy*30 + 22 + bob;
    const ang = Math.atan2(uy, ux);
    ctx.save();
    ctx.translate(ax, ay);
    ctx.rotate(ang + Math.PI/2);
    ctx.beginPath();
    ctx.moveTo(0, -10);
    ctx.lineTo(9, 8);
    ctx.lineTo(0, 3);
    ctx.lineTo(-9, 8);
    ctx.closePath();
    ctx.fillStyle = '#5FE33B';
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 1.5;
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  function drawFootSwirl(t){
    if(!player.moving) return;
    ctx.save();
    ctx.translate(player.x, player.y+15);
    ctx.rotate(t*6);
    ctx.beginPath();
    ctx.ellipse(0,0,15,7,0,0,Math.PI*1.5);
    ctx.strokeStyle = 'rgba(120,200,255,0.55)';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    ctx.restore();
  }

  function draw(){
    const s = scaleFactor();
    ctx.save();
    ctx.setTransform(s,0,0,s,0,0);
    ctx.clearRect(0,0,VW,VH);

    // sky/ice gradient background
    const g = ctx.createLinearGradient(0,0,0,VH);
    g.addColorStop(0, '#bfe4f6');
    g.addColorStop(0.55, '#e8f4fb');
    g.addColorStop(1, '#f7fcff');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,VW,VH);

    // subtle ice cracks
    ctx.strokeStyle = 'rgba(120,170,200,0.25)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(60,150); ctx.lineTo(140,260); ctx.lineTo(90,380);
    ctx.moveTo(420,180); ctx.lineTo(340,300); ctx.lineTo(410,420);
    ctx.stroke();

    // path connecting zones to depot
    ctx.strokeStyle = 'rgba(150,110,60,0.35)';
    ctx.lineWidth = 14;
    ctx.lineCap = 'round';
    zones.forEach(z=>{
      ctx.beginPath();
      ctx.moveTo(z.cx, z.cy);
      ctx.lineTo(depot.x, depot.y);
      ctx.stroke();
    });

    zones.forEach(drawZone);
    drawDepot();

    const t = performance.now()/1000;

    pickups.forEach(p=>drawPickup(p,t));

    // decorative idle queue
    queue.forEach(q=>{
      const bob = Math.sin(t*2 + q.phase) * 2;
      drawWorker(q.x, q.y, 1, bob, true);
    });

    drawFootSwirl(t);

    // player
    drawWorker(player.x, player.y, player.facing, Math.sin(t*8)*1.2, true);
    drawCarryStacks(t);
    drawChopTool(t);
    drawMoveArrow(t);

    // snow
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    snow.forEach(f=>{
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
      ctx.fill();
    });

    // particles
    particles.forEach(p=>{
      const a = 1 - p.t/p.life;
      ctx.globalAlpha = Math.max(0,a);
      ctx.font = 'bold 16px Space Grotesk, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = p.color;
      ctx.fillText(p.text, p.x, p.y - p.t*40);
      ctx.globalAlpha = 1;
    });

    ctx.restore();
  }

  function loop(now){
    const dt = Math.min(0.05, (now-last)/1000);
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  showToast('Chop, hunt & mine — then haul it all back to camp!');
})();
</script>
