<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

       font-family:monospace;padding:8px;min-height:100vh;touch-action:none;}
  #hud{width:100%;max-width:800px;margin-bottom:4px;}
  .hud-row{display:flex;align-items:center;gap:8px;}
  .hpbar-wrap{flex:1;display:flex;align-items:center;gap:6px;}
  .hpbar-wrap.flip{flex-direction:row-reverse;}
  .hpbar-label{min-width:40px;}
  .hpbar-label.flip{text-align:right;}
  .hpbar-name{font-weight:bold;font-size:11px;}
  .hpbar-stars{color:#fff;font-size:10px;}
  .hpbar-track{flex:1;height:16px;background:#1a1a2e;border:2px solid #a855f7;
               border-radius:4px;overflow:hidden;}
  .hpbar-fill{height:100%;border-radius:2px;transition:width 0.1s,background 0.3s;}
  #timer-box{text-align:center;min-width:60px;}
  #timer-val{color:#ffd700;font-weight:bold;font-size:20px;text-shadow:0 0 10px #ffd700;}
  #round-label{color:#a855f7;font-size:9px;}
  #toolbar{width:100%;max-width:800px;display:flex;gap:6px;margin-bottom:4px;}
  .tool-btn{flex:1;padding:7px 0;border-radius:6px;font-size:12px;font-weight:bold;
            cursor:pointer;font-family:monospace;}
  #canvas-wrap{position:relative;width:100%;max-width:800px;}
  canvas{width:100%;height:auto;display:block;border-radius:8px;
         border:2px solid #a855f7;box-shadow:0 0 30px #a855f750;}
  .overlay{position:absolute;inset:0;background:rgba(0,0,0,0.88);
           display:flex;flex-direction:column;align-items:center;
           justify-content:center;border-radius:8px;z-index:10;}

  .ov-title{font-size:34px;font-weight:bold;color:#ffd700;

  .menu-btn{border:none;border-radius:8px;color:#fff;padding:10px 28px;

  .dpad{display:flex;flex-direction:column;align-items:center;gap:5px;}

  .touch-btn{width:56px;height:56px;border-radius:12px;
             border:2px solid rgba(255,255,255,0.25);color:#fff;font-weight:bold;
             font-size:16px;cursor:pointer;display:flex;align-items:center;
             justify-content:center;touch-action:none;user-select:none;
             -webkit-tap-highlight-color:transparent;font-family:monospace;

  .touch-spacer{width:56px;height:56px;flex-shrink:0;}
  .ctrl-label{color:#222;font-size:10px;text-align:center;}
  #kb-hint{color:#2a2a3a;font-size:10px;margin-top:8px;text-align:center;}
  #music-btn{position:absolute;top:6px;right:8px;background:rgba(0,0,0,0.5);
             border:1px solid #a855f7;border-radius:6px;color:#fff;
             padding:3px 8px;font-size:11px;cursor:pointer;z-index:20;font-family:monospace;}
</style>

<body>

  <div class="dpad">
    <div class="dpad-row">

    </div>
    <div class="dpad-row">
      <button class="touch-btn" id="btn-left" style="background:#ffffff15">◀</button>
      <button class="touch-btn" id="btn-block" style="background:#ffffff10">🛡</button>
      <button class="touch-btn" id="btn-right" style="background:#ffffff15">▶</button>
    </div>
  </div>
  <div class="ctrl-label"><div style="margin-bottom:20px">MOVE</div><div>ATTACK</div></div>
  <div class="dpad">
    <div class="dpad-row">
      <div class="touch-spacer"></div>
      <button class="touch-btn" id="btn-special" style="background:#a855f740">SP</button>
      <div class="touch-spacer"></div>
    </div>
    <div class="dpad-row">
      <button class="touch-btn" id="btn-punch" style="background:#e6394660">P</button>

    </div>
  </div>
</div>
<div id="kb-hint">Keyboard: A/D · W jump · J punch · K kick · L special · ; block · Esc pause</div>

<script>
// ═══════════════════════════════════════════════════
//  AUDIO ENGINE  (Web Audio API — no files needed)
// ═══════════════════════════════════════════════════
let audioCtx = null;
let musicEnabled = true;
let musicNodes = {};
let musicPlaying = false;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// ── SFX helpers ──
function playTone(freq, type, dur, vol=0.3, delay=0) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type; osc.frequency.setValueAtTime(freq, ac.currentTime+delay);
    gain.gain.setValueAtTime(vol, ac.currentTime+delay);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+delay+dur);
    osc.start(ac.currentTime+delay); osc.stop(ac.currentTime+delay+dur+0.01);
  } catch(e){}
}

function playNoise(dur, vol=0.15) {
  try {
    const ac = getAudio();
    const buf = ac.createBuffer(1, ac.sampleRate*dur, ac.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
    const src = ac.createBufferSource();
    const gain = ac.createGain();
    const filt = ac.createBiquadFilter();
    filt.type='bandpass'; filt.frequency.value=1200; filt.Q.value=0.5;
    src.buffer=buf; src.connect(filt); filt.connect(gain); gain.connect(ac.destination);
    gain.gain.setValueAtTime(vol,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    src.start(); src.stop(ac.currentTime+dur+0.01);
  } catch(e){}
}

function sfxPunch()   { playTone(180,  'square', 0.07, 0.4); playNoise(0.04, 0.2); }
function sfxKick()    { playTone(100,  'square', 0.10, 0.5); playNoise(0.06, 0.25); playTone(60,'sine',0.08,0.3); }
function sfxSpecial() {
  playTone(220,'sawtooth',0.05,0.3); playTone(440,'sawtooth',0.08,0.3,0.05);
  playTone(880,'sawtooth',0.10,0.35,0.10); playNoise(0.15,0.3);
}
function sfxBlock()   { playTone(600,'square',0.04,0.2); playTone(300,'square',0.04,0.15,0.02); }
function sfxKO() {
  [220,196,174,130].forEach((f,i)=>{ playTone(f,'sawtooth',0.18,0.4,i*0.12); });
  setTimeout(()=>{ playTone(110,'sine',0.5,0.5); },600);
}
function sfxFight() {
  [523,659,784,1046].forEach((f,i)=>{ playTone(f,'square',0.08,0.25,i*0.07); });
}
function sfxRound() {
  playTone(440,'sine',0.15,0.3); playTone(550,'sine',0.15,0.3,0.18);
  playTone(660,'sine',0.25,0.4,0.36);
}

// ── Background Music ──
// Energetic chip-tune style fight music using oscillators + sequencer
const MUSIC_BPM = 160;
const BEAT = 60 / MUSIC_BPM;

// Bass line pattern (root notes in Hz)
const BASS_PATTERN = [110,110,130,110, 98,98,110,98, 87,87,98,87, 82,87,98,110];
// Melody pattern
const MELODY_PATTERN = [
  440,0,440,0, 523,0,494,440, 392,0,440,0, 494,523,494,440,
  349,0,392,0, 440,0,440,494, 523,0,494,0, 440,494,523,0
];
// Chord stabs (played every 4 beats)
const CHORD_PATTERN = [
  [220,277,330], [196,247,294], [175,220,262], [165,208,247]
];

function startMusic() {
  if (musicPlaying || !musicEnabled) return;
  try {
    const ac = getAudio();
    musicPlaying = true;
    let step = 0;
    let melStep = 0;
    let chordStep = 0;
    let beatCount = 0;

    // Master gain
    const masterGain = ac.createGain();
    masterGain.gain.value = 0.22;
    masterGain.connect(ac.destination);
    musicNodes.master = masterGain;

    // Compressor for punch
    const comp = ac.createDynamicsCompressor();
    comp.threshold.value = -18; comp.ratio.value = 4;
    comp.connect(masterGain);

    // Reverb (convolver with short impulse)
    const reverbGain = ac.createGain();
    reverbGain.gain.value = 0.18;
    reverbGain.connect(masterGain);

    function scheduleNote(freq, type, start, dur, vol, destination) {
      if (!musicPlaying) return;
      try {
        const osc = ac.createOscillator();
        const g = ac.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        osc.connect(g); g.connect(destination || comp);
        g.gain.setValueAtTime(0, start);
        g.gain.linearRampToValueAtTime(vol, start + 0.01);
        g.gain.setValueAtTime(vol, start + dur * 0.7);
        g.gain.exponentialRampToValueAtTime(0.001, start + dur);
        osc.start(start); osc.stop(start + dur + 0.01);
      } catch(e){}
    }

    function scheduleNoise(start, dur, vol, freq) {
      if (!musicPlaying) return;
      try {
        const buf = ac.createBuffer(1, Math.ceil(ac.sampleRate*dur), ac.sampleRate);
        const d = buf.getChannelData(0);
        for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
        const src = ac.createBufferSource();
        const g = ac.createGain();
        const f = ac.createBiquadFilter();
        f.type='highpass'; f.frequency.value = freq||4000;
        src.buffer=buf; src.connect(f); f.connect(g); g.connect(comp);
        g.gain.setValueAtTime(vol,start);
        g.gain.exponentialRampToValueAtTime(0.001,start+dur);
        src.start(start); src.stop(start+dur+0.01);
      } catch(e){}
    }

    function tick() {
      if (!musicPlaying) return;
      const now = ac.currentTime;
      const ahead = BEAT * 4; // schedule 4 beats ahead

      // Bass
      const bassFreq = BASS_PATTERN[step % BASS_PATTERN.length];
      if (bassFreq) scheduleNote(bassFreq, 'square', now, BEAT*0.85, 0.5);
      // Bass octave up ghost note
      if (Math.random() < 0.3) scheduleNote(bassFreq*2, 'square', now+BEAT*0.5, BEAT*0.35, 0.15);

      // Melody (runs at half speed of bass)
      if (beatCount % 1 === 0) {
        const mFreq = MELODY_PATTERN[melStep % MELODY_PATTERN.length];
        if (mFreq) scheduleNote(mFreq, 'triangle', now, BEAT*0.6, 0.35);
        melStep++;
      }

      // Chord stabs every 4 beats
      if (beatCount % 4 === 0) {
        const chord = CHORD_PATTERN[chordStep % CHORD_PATTERN.length];
        chord.forEach(f => scheduleNote(f, 'sawtooth', now, BEAT*0.3, 0.12));
        chordStep++;
      }

      // Hi-hat (every beat + offbeat)
      scheduleNoise(now, 0.04, 0.25, 8000);
      if (beatCount % 2 === 0) scheduleNoise(now + BEAT*0.5, 0.03, 0.12, 10000);

      // Kick drum (beats 1 and 3 of every 4)
      if (beatCount % 4 === 0 || beatCount % 4 === 2) {
        scheduleNote(55, 'sine', now, 0.15, 0.9);
        scheduleNote(110, 'sine', now, 0.04, 0.5);
        scheduleNoise(now, 0.03, 0.3, 200);
      }

      // Snare (beats 2 and 4)
      if (beatCount % 4 === 1 || beatCount % 4 === 3) {
        scheduleNoise(now, 0.1, 0.4, 2000);
        scheduleNote(200, 'sine', now, 0.06, 0.2);
      }

      step++; beatCount++;
      musicNodes.timer = setTimeout(tick, BEAT * 1000 - 10);
    }

    tick();
  } catch(e){ musicPlaying=false; }
}

function stopMusic() {
  musicPlaying = false;
  if (musicNodes.timer) { clearTimeout(musicNodes.timer); musicNodes.timer=null; }
  if (musicNodes.master) {
    try { musicNodes.master.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.3); } catch(e){}
    setTimeout(()=>{ try{musicNodes.master.disconnect();}catch(e){} musicNodes.master=null; },400);
  }
}

// ═══════════════════════════════════════════════════
//  GAME CONSTANTS
// ═══════════════════════════════════════════════════
const GROUND_Y   = 300;
const CHAR_WIDTH = 60;
const CHAR_HEIGHT= 90;
const GRAVITY    = 0.6;
const JUMP_FORCE = -14;
const MOVE_SPEED = 4;
const MAX_HEALTH = 100;
const ROUND_TIME = 60;

const COLORS = {
  p1: { body:"#e63946", dark:"#c1121f", skin:"#f4a261" },
  p2: { body:"#457b9d", dark:"#1d3557", skin:"#f4a261" },
};
const ATTACKS = {
  punch:   { damage:8,  range:85,  duration:14, cooldown:16, knockback:3, color:"#ffd700" },
  kick:    { damage:12, range:105, duration:18, cooldown:20, knockback:5, color:"#ff6b35" },
  special: { damage:20, range:135, duration:26, cooldown:30, knockback:8, color:"#a855f7" },
};

// ═══════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════
function initFighter(x, facing) {
  return { x, y:GROUND_Y, vx:0, vy:0, health:MAX_HEALTH, facing,
           state:"idle", stateTimer:0, blocking:false, onGround:true,
           hitFlash:0, attackType:null, attackCooldown:0, hitLanded:false };
}
function initBot() {
  return { actionTimer:0, action:"approach", blockTimer:0, aggressionCooldown:0 };
}

const G = {
  p1: initFighter(150,"right"), p2: initFighter(580,"left"),
  bot: initBot(), effects: [],
  gameState:"title", paused:false, cpuEnabled:true,
  timer:ROUND_TIME, timerTick:0,
  keys: new Set(), prevKeys: new Set(), prevBtns:{},
  screenShake:0,
  winner:null, p1Wins:0, p2Wins:0, round:1,
  announceText:"", announceTimer:0,
};

// ═══════════════════════════════════════════════════
//  BOT AI
// ═══════════════════════════════════════════════════
function updateBot() {
  const bot=G.bot, p2=G.p2, p1=G.p1;
  const dist=Math.abs(p2.x-p1.x);
  const canAct=p2.state!=="attack"&&p2.state!=="hit";
  let left=false,right=false,jump=false,block=false,punch=false,kick=false,special=false;
  if(bot.actionTimer>0) bot.actionTimer--;
  if(bot.aggressionCooldown>0) bot.aggressionCooldown--;
  if(bot.blockTimer>0){bot.blockTimer--;block=true;}
  if(p2.hitFlash>0&&bot.blockTimer<=0&&Math.random()<0.25) bot.blockTimer=18+Math.floor(Math.random()*18);
  const isLow=p2.health<30, oppLow=p1.health<30;
  if(bot.actionTimer<=0&&!block){
    const r=Math.random();
    if(dist>200){bot.action="approach";bot.actionTimer=20+Math.floor(Math.random()*30);}
    else if(dist<60){bot.action=r<0.5?"attack":"retreat";bot.actionTimer=r<0.5?8:20;}
    else{
      if(r<0.45){bot.action="attack";bot.actionTimer=12;}
      else if(r<0.6){bot.action="retreat";bot.actionTimer=25;}
      else if(r<0.75){bot.action="approach";bot.actionTimer=20;}
      else{bot.action="wait";bot.actionTimer=15;}
    }
    if(Math.random()<0.08&&p2.onGround) jump=true;
    if(Math.random()<0.08&&bot.blockTimer<=0) bot.blockTimer=15;
  }
  if(!block){
    const md=p2.x>p1.x?-1:1;
    if(bot.action==="approach"&&canAct){md>0?right=true:left=true;}
    else if(bot.action==="retreat"&&canAct){md>0?left=true:right=true;}
    else if(bot.action==="attack"&&canAct&&bot.aggressionCooldown<=0){
      if(dist<ATTACKS.special.range&&Math.random()<(isLow?0.05:0.10)){special=true;bot.aggressionCooldown=40;}
      else if(dist<ATTACKS.kick.range&&Math.random()<0.35){kick=true;bot.aggressionCooldown=20;}
      else if(dist<ATTACKS.punch.range&&Math.random()<0.5){punch=true;bot.aggressionCooldown=12;}
      else{md>0?right=true:left=true;}
    }
    if(isLow&&dist<ATTACKS.special.range&&canAct&&bot.aggressionCooldown<=0&&Math.random()<0.04){special=true;bot.aggressionCooldown=35;}
    if(oppLow&&dist<ATTACKS.kick.range&&canAct&&bot.aggressionCooldown<=0&&Math.random()<0.18){kick=true;bot.aggressionCooldown=15;}
  }
  return{left,right,jump,block,punch,kick,special};
}

// ═══════════════════════════════════════════════════
//  HIT EFFECTS
// ═══════════════════════════════════════════════════
function spawnHit(attacker, defender, type) {
  const atk=ATTACKS[type];
  const hitX=defender.x+CHAR_WIDTH/2, hitY=defender.y+(type==="kick"?50:20);
  if(defender.blocking){
    G.effects.push({x:hitX,y:hitY,color:"#74b3ce",text:"BLOCK",size:30,life:25,maxLife:25,type:"block"});
    sfxBlock();
    return;
  }
  const dmg=atk.damage;
  defender.health=Math.max(0,defender.health-dmg);
  defender.hitFlash=14; defender.state="hit";
  defender.stateTimer=type==="special"?18:type==="kick"?13:9;
  defender.vx=attacker.facing==="right"?atk.knockback:-atk.knockback;
  defender.vy=type==="special"?-5:type==="kick"?-3:-1.5;
  G.screenShake=type==="special"?10:type==="kick"?6:3;
  G.effects.push({x:hitX,y:hitY,color:atk.color,text:`${dmg}!`,size:55+dmg*1.5,life:40,maxLife:40,type:"hit"});
  const sparks=type==="special"?5:type==="kick"?3:0;
  for(let s=0;s<sparks;s++){
    G.effects.push({x:hitX+(Math.random()-0.5)*30,y:hitY+(Math.random()-0.5)*20,
      color:atk.color,text:"",size:20+Math.random()*20,life:20+s*4,maxLife:20+s*4,type:"spark"});
  }
  if(type==="special") sfxSpecial();
  else if(type==="kick") sfxKick();
  else sfxPunch();
}

// ═══════════════════════════════════════════════════
//  DRAW FUNCTIONS
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

function drawBG() {
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,"#0f0c29");grad.addColorStop(0.5,"#302b63");grad.addColorStop(1,"#24243e");
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  ctx.fillStyle="rgba(255,255,255,0.6)";
  [17,31,47,61,79,83,97,113,127,139,151,163,179,191,211].forEach((s,i)=>{
    ctx.beginPath();ctx.arc((s*37+i*53)%W,(s*23+i*41)%(H*0.5),1,0,Math.PI*2);ctx.fill();
  });
  ctx.beginPath();ctx.arc(W-80,50,30,0,Math.PI*2);ctx.fillStyle="#ffeaa7";ctx.fill();
  ctx.beginPath();ctx.arc(W-68,44,25,0,Math.PI*2);ctx.fillStyle="#302b63";ctx.fill();
  ctx.fillStyle="#1a1535";
  for(let i=0;i<20;i++){const bx=(i*47+13)%(W-20),bh=30+(i*31+7)%60;ctx.fillRect(bx,H*0.45-bh,20+(i*13)%20,bh);}
  const gGrad=ctx.createLinearGradient(0,GROUND_Y+CHAR_HEIGHT,0,H);
  gGrad.addColorStop(0,"#2d2b55");gGrad.addColorStop(1,"#1a1a2e");
  ctx.fillStyle=gGrad;ctx.fillRect(0,GROUND_Y+CHAR_HEIGHT,W,H-GROUND_Y-CHAR_HEIGHT);
  ctx.beginPath();ctx.moveTo(0,GROUND_Y+CHAR_HEIGHT);ctx.lineTo(W,GROUND_Y+CHAR_HEIGHT);
  ctx.strokeStyle="#a855f7";ctx.lineWidth=2;ctx.shadowColor="#a855f7";ctx.shadowBlur=8;ctx.stroke();ctx.shadowBlur=0;
  ctx.strokeStyle="rgba(168,85,247,0.15)";ctx.lineWidth=1;
  for(let i=0;i<W;i+=40){ctx.beginPath();ctx.moveTo(i,GROUND_Y+CHAR_HEIGHT);ctx.lineTo(i,H);ctx.stroke();}
}

function drawFighter(f, colors, label) {
  const {x,y,facing,state,hitFlash,blocking,stateTimer,attackType}=f;
  const dir=facing==="right"?1:-1;
  ctx.save();
  ctx.translate(x+CHAR_WIDTH/2,y);
  if(hitFlash>0) ctx.globalAlpha=0.55+Math.sin(hitFlash*1.2)*0.45;
  const bob=state==="idle"?Math.sin(Date.now()/300)*2:0;
  const walkBob=state==="walk"?Math.sin(Date.now()/150)*4:0;
  const totalBob=bob+walkBob;
  const isAtt=state==="attack";
  const atkDur=isAtt?ATTACKS[attackType||"punch"].duration:1;
  const atkT=isAtt?(1-stateTimer/atkDur):0;
  const swing=isAtt?Math.sin(atkT*Math.PI):0;
  const scaleY=f.vy<-5?1.1:f.vy>5?0.9:1;
  const scaleX=f.vy<-5?0.9:f.vy>5?1.1:1;
  ctx.scale(dir,1);ctx.scale(scaleX,scaleY);
  ctx.lineCap="round";ctx.lineJoin="round";
  // Shadow
  ctx.save();ctx.scale(1,1/scaleY);
  ctx.beginPath();ctx.ellipse(0,GROUND_Y-y+5+CHAR_HEIGHT,20,6,0,0,Math.PI*2);
  ctx.fillStyle="rgba(0,0,0,0.3)";ctx.fill();ctx.restore();
  const lp=state==="walk"?Date.now()/150:0;
  const wsL=state==="walk"?Math.sin(lp)*12:0;
  const wsR=state==="walk"?-Math.sin(lp)*12:0;
  const isKick=isAtt&&attackType==="kick";
  const isSpec=isAtt&&attackType==="special";
  const isPunch=isAtt&&attackType==="punch";
  let kkX=0,kkY=0,kfX=0,kfY=0;
  if(isKick||isSpec){
    const kr=Math.min(swing*2,1),fe=Math.max(swing*2-1,0);
    kkX=kr*10;kkY=totalBob+55-kr*35;kfX=kkX+fe*45;kfY=kkY+fe*20;
  }
  // Back leg
  ctx.beginPath();ctx.moveTo(-8,totalBob+40);ctx.lineTo(-8+wsR,totalBob+CHAR_HEIGHT);
  ctx.lineWidth=10;ctx.strokeStyle=colors.dark;ctx.stroke();
  // Front leg
  if(isKick||isSpec){
    ctx.beginPath();ctx.moveTo(8,totalBob+40);ctx.lineTo(kkX,kkY);
    ctx.lineWidth=10;ctx.strokeStyle=colors.body;ctx.stroke();
    ctx.beginPath();ctx.moveTo(kkX,kkY);ctx.lineTo(kfX,kfY);
    ctx.lineWidth=9;ctx.strokeStyle=colors.body;ctx.stroke();
    ctx.beginPath();ctx.arc(kfX,kfY,8,0,Math.PI*2);
    ctx.fillStyle=colors.dark;
    if(swing>0.4){ctx.shadowColor=ATTACKS.kick.color;ctx.shadowBlur=14*swing;}
    ctx.fill();ctx.shadowBlur=0;
  } else {
    ctx.beginPath();ctx.moveTo(8,totalBob+40);ctx.lineTo(8+wsL,totalBob+CHAR_HEIGHT);
    ctx.lineWidth=10;ctx.strokeStyle=colors.body;ctx.stroke();
  }
  // Torso
  ctx.beginPath();ctx.roundRect(-16,totalBob+10,32,35,6);
  ctx.fillStyle=blocking?colors.dark:colors.body;ctx.fill();
  ctx.beginPath();ctx.rect(-16,totalBob+38,32,6);ctx.fillStyle="#ffd700";ctx.fill();
  // Head
  ctx.beginPath();ctx.arc(0,totalBob-2,16,0,Math.PI*2);
  ctx.fillStyle=colors.skin;ctx.fill();
  ctx.strokeStyle=colors.dark;ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(5,totalBob-4,3,0,Math.PI*2);ctx.fillStyle="#1a1a2e";ctx.fill();
  ctx.beginPath();ctx.arc(5,totalBob-4,1.5,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
  ctx.beginPath();
  if(f.health<30) ctx.arc(2,totalBob+4,5,0.2,Math.PI-0.2);
  else ctx.arc(2,totalBob+2,5,-Math.PI+0.2,-0.2);
  ctx.strokeStyle="#1a1a2e";ctx.lineWidth=1.5;ctx.stroke();
  // Arms
  if(isPunch){
    const jab=swing*42;
    ctx.beginPath();ctx.moveTo(-10,totalBob+18);ctx.lineTo(-22,totalBob+38);
    ctx.lineWidth=8;ctx.strokeStyle=colors.dark;ctx.stroke();
    ctx.beginPath();ctx.moveTo(10,totalBob+18);ctx.lineTo(10+jab,totalBob+20);
    ctx.lineWidth=8;ctx.strokeStyle=colors.body;ctx.stroke();
    ctx.beginPath();ctx.arc(10+jab,totalBob+20,8,0,Math.PI*2);
    ctx.fillStyle=colors.skin;
    if(swing>0.3){ctx.shadowColor=ATTACKS.punch.color;ctx.shadowBlur=16*swing;}
    ctx.fill();ctx.shadowBlur=0;
    if(swing>0.35){for(let i=0;i<4;i++){const o=i*10;ctx.beginPath();ctx.moveTo(10+jab-20-o,totalBob+15+i*2);ctx.lineTo(10+jab-8-o,totalBob+15+i*2);ctx.strokeStyle=`rgba(255,215,0,${0.7-i*0.15})`;ctx.lineWidth=2;ctx.stroke();}}
  } else if(isSpec){
    const rise=swing;
    ctx.beginPath();ctx.moveTo(-10,totalBob+18);ctx.lineTo(-24,totalBob+30+rise*10);
    ctx.lineWidth=8;ctx.strokeStyle=colors.dark;ctx.stroke();
    const upX=10+rise*30,upY=totalBob+18-rise*50;
    ctx.beginPath();ctx.moveTo(10,totalBob+18);ctx.lineTo(upX,upY);
    ctx.lineWidth=8;ctx.strokeStyle=colors.body;ctx.stroke();
    ctx.beginPath();ctx.arc(upX,upY,9,0,Math.PI*2);
    ctx.fillStyle=colors.skin;ctx.shadowColor=ATTACKS.special.color;ctx.shadowBlur=20*rise;ctx.fill();ctx.shadowBlur=0;
    for(let i=0;i<4;i++){const rt=(atkT+i/4)%1,r=rt*40;ctx.beginPath();ctx.arc(upX,upY,r+8,0,Math.PI*2);ctx.strokeStyle=`rgba(168,85,247,${(1-rt)*0.8})`;ctx.lineWidth=3;ctx.stroke();}
  } else if(isKick){
    ctx.beginPath();ctx.moveTo(-10,totalBob+18);ctx.lineTo(-24+swing*10,totalBob+28-swing*8);
    ctx.lineWidth=8;ctx.strokeStyle=colors.dark;ctx.stroke();
    ctx.beginPath();ctx.moveTo(10,totalBob+18);ctx.lineTo(22-swing*15,totalBob+26+swing*5);
    ctx.lineWidth=8;ctx.strokeStyle=colors.body;ctx.stroke();
  } else if(blocking){
    ctx.beginPath();ctx.moveTo(-10,totalBob+18);ctx.lineTo(18,totalBob+8);
    ctx.lineWidth=8;ctx.strokeStyle=colors.dark;ctx.stroke();
    ctx.beginPath();ctx.moveTo(10,totalBob+18);ctx.lineTo(18,totalBob+8);
    ctx.lineWidth=8;ctx.strokeStyle=colors.body;ctx.stroke();
    ctx.beginPath();ctx.arc(18,totalBob+8,22,-Math.PI/2,Math.PI/2);
    ctx.strokeStyle="rgba(100,200,255,0.5)";ctx.lineWidth=4;ctx.stroke();
  } else {
    ctx.beginPath();ctx.moveTo(-10,totalBob+18);ctx.lineTo(-20+wsL*0.5,totalBob+38);
    ctx.lineWidth=8;ctx.strokeStyle=colors.dark;ctx.stroke();
    ctx.beginPath();ctx.moveTo(10,totalBob+18);ctx.lineTo(20+wsR*0.5,totalBob+38);
    ctx.lineWidth=8;ctx.strokeStyle=colors.body;ctx.stroke();
    ctx.beginPath();ctx.arc(20+wsR*0.5,totalBob+38,5,0,Math.PI*2);ctx.fillStyle=colors.skin;ctx.fill();
  }
  ctx.scale(dir,1);
  ctx.fillStyle="rgba(0,0,0,0.7)";ctx.fillRect(-20,totalBob-28,40,14);
  ctx.fillStyle="#fff";ctx.font="bold 9px monospace";ctx.textAlign="center";
  ctx.fillText(label,0,totalBob-17);
  ctx.restore();
}

function drawEffects() {
  G.effects.forEach(e=>{
    const t=e.life/e.maxLife;
    ctx.save();ctx.globalAlpha=t;ctx.translate(e.x,e.y);
    if(e.type==="spark"){
      const r=(1-t)*e.size;
      for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);ctx.strokeStyle=e.color;ctx.lineWidth=2;ctx.stroke();}
    } else if(e.type==="block"){
      const r=(1-t)*e.size;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.strokeStyle=e.color;ctx.lineWidth=3;ctx.stroke();
      ctx.font="bold 11px monospace";ctx.fillStyle=e.color;ctx.textAlign="center";ctx.fillText(e.text,0,-r-4);
    } else {
      const ex=1-t;
      ctx.beginPath();ctx.arc(0,0,ex*18+4,0,Math.PI*2);ctx.fillStyle=e.color;ctx.globalAlpha=t*0.35;ctx.fill();ctx.globalAlpha=t;
      for(let i=0;i<10;i++){const a=(i/10)*Math.PI*2;ctx.beginPath();ctx.moveTo(Math.cos(a)*6,Math.sin(a)*6);ctx.lineTo(Math.cos(a)*ex*e.size*0.5,Math.sin(a)*ex*e.size*0.5);ctx.strokeStyle=e.color;ctx.lineWidth=i%2===0?3:1.5;ctx.stroke();}
      if(e.text){const fy=-(1-t)*35-10;ctx.font=`bold ${16+(1-t)*6}px monospace`;ctx.fillStyle="#fff";ctx.shadowColor=e.color;ctx.shadowBlur=8;ctx.textAlign="center";ctx.fillText(e.text,0,fy);ctx.shadowBlur=0;}
    }
    ctx.restore();
  });
}

// ═══════════════════════════════════════════════════
//  HUD UPDATE
// ═══════════════════════════════════════════════════
function updateHUD() {
  const p1=G.p1,p2=G.p2;
  const hpColor=hp=>hp>50?"#22c55e":hp>25?"#eab308":"#ef4444";
  const p1f=document.getElementById('p1fill');
  p1f.style.width=p1.health+"%";p1f.style.background=hpColor(p1.health);p1f.style.boxShadow=`0 0 8px ${hpColor(p1.health)}`;
  const p2f=document.getElementById('p2fill');
  p2f.style.width=p2.health+"%";p2f.style.background=hpColor(p2.health);p2f.style.boxShadow=`0 0 8px ${hpColor(p2.health)}`;
  document.getElementById('timer-val').textContent=G.timer;
  document.getElementById('round-label').textContent=`RND ${G.round}`;
  document.getElementById('p1stars').textContent="★".repeat(G.p1Wins)+"☆".repeat(2-G.p1Wins);
  document.getElementById('p2stars').textContent="★".repeat(G.p2Wins)+"☆".repeat(2-G.p2Wins);
}

// ═══════════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════════
function announce(text, dur=90) { G.announceText=text; G.announceTimer=dur; }

function startRound() {
  G.p1=initFighter(150,"right"); G.p2=initFighter(580,"left");
  G.bot=initBot(); G.effects=[];
  G.timer=ROUND_TIME; G.timerTick=0;
  G.paused=false; G.gameState="fight";
  G.prevKeys=new Set(); G.prevBtns={};
  showOverlay(null);
  if(musicEnabled) startMusic();
  sfxFight();
  announce("FIGHT!",60);
}

function endRound(winner) {
  G.gameState="roundEnd";
  G.winner=winner;
  if(winner==="P1") G.p1Wins++;
  else if(winner==="P2") G.p2Wins++;
  sfxKO();
  if(winner==="P1") announce("K.O.! YOU WIN!",180);
  else if(winner==="P2") announce("K.O.! CPU WINS!",180);
  else announce("DRAW!",180);
}

function showOverlay(id) {
  ["ov-title","ov-pause","ov-gameover"].forEach(x=>{
    document.getElementById(x).classList.toggle("hidden", x!==id);
  });
}

function updateFighter(f, opp, inp) {
  if(f.x<opp.x) f.facing="right"; else f.facing="left";
  if(f.stateTimer>0) f.stateTimer--;
  if(f.hitFlash>0) f.hitFlash--;
  if(f.attackCooldown>0) f.attackCooldown--;
  const canAct=f.state!=="attack"&&f.state!=="hit";
  f.blocking=inp.block&&canAct&&f.onGround;
  if(canAct&&!f.blocking&&f.attackCooldown<=0){
    let atk=null;
    if(inp.special) atk="special";
    else if(inp.kick) atk="kick";
    else if(inp.punch) atk="punch";
    if(atk){
      f.state="attack";f.attackType=atk;
      f.stateTimer=ATTACKS[atk].duration;
      f.attackCooldown=ATTACKS[atk].cooldown;
      f.hitLanded=false;
    }
  }
  // Hit detection during active window
  if(f.state==="attack"&&!f.hitLanded){
    const dur=ATTACKS[f.attackType].duration;
    const prog=1-(f.stateTimer/dur);
    if(prog>0.25&&prog<0.75){
      const dist=Math.abs(f.x-opp.x);
      if(dist<ATTACKS[f.attackType].range){
        f.hitLanded=true;
        spawnHit(f,opp,f.attackType);
      }
    }
  }
  if(canAct&&!f.blocking){
    if(inp.left){f.vx=-MOVE_SPEED;if(f.onGround)f.state="walk";}
    else if(inp.right){f.vx=MOVE_SPEED;if(f.onGround)f.state="walk";}
    else{f.vx*=0.7;if(f.onGround&&f.state==="walk")f.state="idle";}
  } else if(f.state==="hit"){f.vx*=0.8;}
  if(inp.jump&&f.onGround&&canAct){f.vy=JUMP_FORCE;f.onGround=false;f.state="jump";}
  f.vy+=GRAVITY;f.y+=f.vy;f.x+=f.vx;
  if(f.y>=GROUND_Y){f.y=GROUND_Y;f.vy=0;f.onGround=true;if(f.state==="jump"||f.state==="hit")f.state="idle";}
  f.x=Math.max(20,Math.min(W-CHAR_WIDTH-20,f.x));
  if(f.state==="attack"&&f.stateTimer<=0)f.state="idle";
  if(f.state==="hit"&&f.stateTimer<=0)f.state="idle";
}

// ═══════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════
const keys = new Set();
const touchState = {};

window.addEventListener('keydown', e=>{
  keys.add(e.code);
  if(e.code==="Escape") togglePause();
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e=>keys.delete(e.code));

// Touch buttons
const touchMap = {
  'btn-left':'left','btn-right':'right','btn-up':'up',
  'btn-block':'block','btn-punch':'punch','btn-kick':'kick','btn-special':'special'
};
Object.entries(touchMap).forEach(([id, name])=>{
  const el=document.getElementById(id);
  el.addEventListener('pointerdown',e=>{e.preventDefault();el.setPointerCapture(e.pointerId);touchState[name]=true;});
  el.addEventListener('pointerup',e=>{e.preventDefault();touchState[name]=false;});
  el.addEventListener('pointercancel',e=>{e.preventDefault();touchState[name]=false;});
});
window.addEventListener('pointerup',()=>{ Object.keys(touchState).forEach(k=>touchState[k]=false); });
window.addEventListener('pointercancel',()=>{ Object.keys(touchState).forEach(k=>touchState[k]=false); });

// ═══════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════
let prevBtns={};

function loop() {
  if(G.gameState==="fight"&&!G.paused){
    // Timer
    G.timerTick++;
    if(G.timerTick>=60){
      G.timerTick=0;G.timer--;
      if(G.timer<=0){
        const winner=G.p1.health>=G.p2.health?"P1":G.p2.health>=G.p1.health?"P2":"DRAW";
        endRound(winner);
      }
    }

    // Edge-detect attack buttons
    const p1punch  =(keys.has("KeyJ")&&!G.prevKeys.has("KeyJ"))||(touchState.punch&&!prevBtns.punch);
    const p1kick   =(keys.has("KeyK")&&!G.prevKeys.has("KeyK"))||(touchState.kick&&!prevBtns.kick);
    const p1special=(keys.has("KeyL")&&!G.prevKeys.has("KeyL"))||(touchState.special&&!prevBtns.special);
    G.prevKeys=new Set(keys);
    prevBtns={punch:touchState.punch,kick:touchState.kick,special:touchState.special};

    if(G.screenShake>0) G.screenShake--;

    const p1inp={
      left: keys.has("KeyA")||touchState.left,
      right:keys.has("KeyD")||touchState.right,
      jump: keys.has("KeyW")||touchState.up,
      block:keys.has("Semicolon")||touchState.block,
      punch:p1punch, kick:p1kick, special:p1special
    };
    const botInp=G.cpuEnabled?updateBot():{left:false,right:false,jump:false,block:false,punch:false,kick:false,special:false};

    updateFighter(G.p1,G.p2,p1inp);
    updateFighter(G.p2,G.p1,botInp);

    for(let i=G.effects.length-1;i>=0;i--){G.effects[i].life--;if(G.effects[i].life<=0)G.effects.splice(i,1);}

    if(G.p1.health<=0||G.p2.health<=0){
      if(G.p1.health<=0&&G.p2.health<=0) endRound("DRAW");
      else if(G.p1.health<=0) endRound("P2");
      else endRound("P1");
    }
    if(G.announceTimer>0) G.announceTimer--;

  } else if(G.gameState==="roundEnd"){
    if(G.announceTimer>0) G.announceTimer--;
    else {
      if(G.p1Wins>=2||G.p2Wins>=2){
        G.gameState="gameOver";
        stopMusic();
        document.getElementById('go-winner').textContent=G.p1Wins>=2?"YOU WIN! 🏆":"CPU WINS!";
        document.getElementById('go-score').textContent=`${G.p1Wins} – ${G.p2Wins}`;
        showOverlay("ov-gameover");
      } else {
        G.round++;
        sfxRound();
        startRound();
      }
    }
  }

  // Draw
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(G.screenShake>0) ctx.translate((Math.random()-0.5)*G.screenShake*1.5,(Math.random()-0.5)*G.screenShake*0.8);
  drawBG();
  drawFighter(G.p1,COLORS.p1,"YOU");
  drawFighter(G.p2,COLORS.p2,"CPU");
  drawEffects();
  ctx.restore();

  if(G.announceText&&G.announceTimer>0){
    const alpha=Math.min(1,G.announceTimer/20);
    ctx.save();ctx.globalAlpha=alpha;ctx.translate(W/2,H/2-30);
    ctx.font="bold 48px 'Arial Black',sans-serif";ctx.textAlign="center";
    ctx.fillStyle="#ffd700";ctx.shadowColor="#ff6b35";ctx.shadowBlur=20;
    ctx.fillText(G.announceText,0,0);ctx.restore();
  }

  updateHUD();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════
//  UI BUTTONS
// ═══════════════════════════════════════════════════
function togglePause() {
  if(G.gameState!=="fight") return;
  G.paused=!G.paused;
  document.getElementById('menu-btn').textContent=G.paused?"▶ RESUME":"⏸ MENU";
  showOverlay(G.paused?"ov-pause":null);
  if(G.paused) stopMusic(); else if(musicEnabled) startMusic();
}

let cpuOn=true;
function toggleCpu() {
  cpuOn=!cpuOn; G.cpuEnabled=cpuOn;
  const btn=document.getElementById('cpu-btn');
  btn.textContent=`CPU: ${cpuOn?"ON":"OFF"}`;
  btn.style.borderColor=cpuOn?"#22c55e":"#ef4444";
  btn.style.color=cpuOn?"#22c55e":"#ef4444";
  btn.style.background=cpuOn?"#1e1e3a":"#2a1a1a";
}

document.getElementById('menu-btn').onclick=togglePause;
document.getElementById('cpu-btn').onclick=toggleCpu;
document.getElementById('start-btn').onclick=startRound;
document.getElementById('resume-btn').onclick=togglePause;
document.getElementById('restart-btn').onclick=()=>{ G.paused=false; showOverlay(null); startRound(); };
document.getElementById('mainmenu-btn').onclick=()=>{ G.paused=false; G.gameState="title"; stopMusic(); showOverlay("ov-title"); document.getElementById('menu-btn').textContent="⏸ MENU"; };
document.getElementById('again-btn').onclick=()=>{ G.p1Wins=0;G.p2Wins=0;G.round=1;G.gameState="title";showOverlay("ov-title"); };

document.getElementById('music-btn').onclick=()=>{
  musicEnabled=!musicEnabled;
  document.getElementById('music-btn').textContent=`🎵 ${musicEnabled?"ON":"OFF"}`;
  if(musicEnabled){ if(G.gameState==="fight"&&!G.paused) startMusic(); }
  else stopMusic();
};

// Kick it off
loop();
</script>
