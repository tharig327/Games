<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Street Brawler</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;
     font-family:monospace;padding:8px;min-height:100vh;touch-action:none;overflow-x:hidden;}
#hud{width:100%;max-width:800px;margin-bottom:4px;}
.hud-row{display:flex;align-items:center;gap:8px;}
.hpbar-wrap{flex:1;display:flex;align-items:center;gap:6px;}
.hpbar-wrap.flip{flex-direction:row-reverse;}
.hpbar-label{min-width:40px;}
.hpbar-label.flip{text-align:right;}
.hpbar-name{font-weight:bold;font-size:11px;}
.hpbar-stars{color:#fff;font-size:10px;}
.hpbar-track{flex:1;height:16px;background:#1a1a2e;border:2px solid #a855f7;border-radius:4px;overflow:hidden;}
.hpbar-fill{height:100%;border-radius:2px;transition:width 0.1s,background 0.3s;}
#timer-box{text-align:center;min-width:60px;}
#timer-val{color:#ffd700;font-weight:bold;font-size:20px;text-shadow:0 0 10px #ffd700;}
#round-label{color:#a855f7;font-size:9px;}
#toolbar{width:100%;max-width:800px;display:flex;gap:6px;margin-bottom:4px;}
.tool-btn{flex:1;padding:7px 0;border-radius:6px;font-size:12px;font-weight:bold;cursor:pointer;font-family:monospace;}
#canvas-wrap{position:relative;width:100%;max-width:800px;}
canvas{width:100%;height:auto;display:block;border-radius:8px;border:2px solid #a855f7;box-shadow:0 0 30px #a855f750;}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.93);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;border-radius:8px;z-index:10;overflow-y:auto;padding:10px 8px;}
.overlay.hidden{display:none;}
.menu-btn{border:none;border-radius:8px;color:#fff;padding:10px 28px;font-size:14px;font-weight:bold;cursor:pointer;letter-spacing:1px;margin-top:8px;min-width:160px;font-family:monospace;}
#controls{width:100%;max-width:800px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;padding:0 4px;gap:8px;}
.dpad{display:flex;flex-direction:column;align-items:center;gap:5px;}
.dpad-row{display:flex;gap:5px;}
.touch-btn{width:56px;height:56px;border-radius:12px;border:2px solid rgba(255,255,255,0.25);color:#fff;font-weight:bold;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:none;user-select:none;-webkit-tap-highlight-color:transparent;font-family:monospace;flex-shrink:0;}
.touch-spacer{width:56px;height:56px;flex-shrink:0;}
.ctrl-label{color:#222;font-size:10px;text-align:center;}
#kb-hint{color:#2a2a3a;font-size:10px;margin-top:8px;text-align:center;}
/* Character select */
.cs-section{width:100%;max-width:360px;margin-bottom:10px;}
.cs-title{color:#ffd700;font-size:12px;font-weight:bold;margin-bottom:6px;text-align:center;letter-spacing:2px;}
.color-grid{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;}
.color-swatch{width:38px;height:38px;border-radius:8px;cursor:pointer;border:3px solid transparent;transition:transform 0.1s,border-color 0.1s;flex-shrink:0;}
.color-swatch:hover{transform:scale(1.12);}
.color-swatch.selected{border-color:#ffd700;transform:scale(1.12);}
.char-preview-canvas{border-radius:8px;display:block;margin:0 auto 8px;}
/* Song select */
.song-list{width:100%;max-width:360px;display:flex;flex-direction:column;gap:5px;}
.song-btn{padding:8px 12px;border-radius:8px;background:#1a1a2e;border:2px solid #333;color:#aaa;font-family:monospace;font-size:12px;cursor:pointer;text-align:left;transition:border-color 0.15s,color 0.15s;}
.song-btn:hover{border-color:#a855f7;color:#fff;}
.song-btn.selected{border-color:#ffd700;color:#ffd700;background:#1e1a2e;}
.song-btn .song-name{font-weight:bold;font-size:13px;}
.song-btn .song-desc{font-size:10px;opacity:0.7;margin-top:2px;}
/* Select screen layout */
.select-row{display:flex;gap:10px;width:100%;justify-content:center;flex-wrap:wrap;}
.select-col{display:flex;flex-direction:column;align-items:center;flex:1;min-width:140px;max-width:200px;}
</style>
</head>
<body>

<div id="hud">
  <div class="hud-row">
    <div class="hpbar-wrap">
      <div class="hpbar-label">
        <div class="hpbar-name" id="p1name" style="color:#ff6b6b">YOU</div>
        <div class="hpbar-stars" id="p1stars">☆☆</div>
      </div>
      <div class="hpbar-track"><div class="hpbar-fill" id="p1fill" style="width:100%;background:#22c55e;box-shadow:0 0 8px #22c55e"></div></div>
    </div>
    <div id="timer-box">
      <div id="timer-val">60</div>
      <div id="round-label">RND 1</div>
    </div>
    <div class="hpbar-wrap flip">
      <div class="hpbar-label flip">
        <div class="hpbar-name" style="color:#74b3ce">CPU</div>
        <div class="hpbar-stars" id="p2stars">☆☆</div>
      </div>
      <div class="hpbar-track"><div class="hpbar-fill" id="p2fill" style="width:100%;background:#22c55e;box-shadow:0 0 8px #22c55e;margin-left:auto"></div></div>
    </div>
  </div>
</div>

<div id="toolbar">
  <button class="tool-btn" id="menu-btn" style="background:#1e1e3a;border:1px solid #a855f7;color:#fff">⏸ MENU</button>
  <button class="tool-btn" id="cpu-btn" style="background:#1e1e3a;border:1px solid #22c55e;color:#22c55e">CPU: ON</button>
</div>

<div id="canvas-wrap">
  <canvas id="canvas" width="800" height="420"></canvas>

  <!-- TITLE SCREEN -->
  <div class="overlay" id="ov-title">
    <div style="font-size:30px;font-weight:bold;color:#ffd700;text-shadow:0 0 20px #ff6b35;margin-bottom:2px;letter-spacing:4px;margin-top:4px;">STREET BRAWLER</div>
    <div style="color:#a855f7;font-size:11px;margin-bottom:10px;">VS CPU — BEST OF 3</div>
    <button class="menu-btn" id="start-btn" style="background:linear-gradient(135deg,#a855f7,#6366f1);margin-bottom:4px;margin-top:0">▶ PLAY</button>
    <button class="menu-btn" id="select-btn" style="background:linear-gradient(135deg,#e63946,#c1121f);margin-top:6px">🎨 CUSTOMIZE</button>
    <div style="color:#555;font-size:10px;margin-top:10px;text-align:center">A/D move · W jump · J punch · K kick · L special · ; block</div>
  </div>

  <!-- CHARACTER + MUSIC SELECT SCREEN -->
  <div class="overlay hidden" id="ov-select">
    <div style="font-size:18px;font-weight:bold;color:#ffd700;letter-spacing:3px;margin-bottom:8px;margin-top:2px;">🎨 CUSTOMIZE</div>

    <!-- Character previews -->
    <div class="select-row" style="margin-bottom:8px;">
      <div class="select-col">
        <div class="cs-title">YOUR COLOR</div>
        <canvas class="char-preview-canvas" id="preview-p1" width="80" height="110"></canvas>
        <div class="color-grid" id="swatches-p1"></div>
      </div>
      <div class="select-col">
        <div class="cs-title">CPU COLOR</div>
        <canvas class="char-preview-canvas" id="preview-p2" width="80" height="110"></canvas>
        <div class="color-grid" id="swatches-p2"></div>
      </div>
    </div>

    <!-- Song select -->
    <div style="color:#ffd700;font-size:12px;font-weight:bold;letter-spacing:2px;margin-bottom:6px;">🎵 MUSIC</div>
    <div class="song-list" id="song-list"></div>

    <div style="display:flex;gap:8px;margin-top:10px;margin-bottom:4px;">
      <button class="menu-btn" id="preview-music-btn" style="background:linear-gradient(135deg,#457b9d,#1d3557);min-width:120px;margin-top:0">▶ PREVIEW</button>
      <button class="menu-btn" id="select-back-btn" style="background:linear-gradient(135deg,#555,#333);min-width:120px;margin-top:0">← BACK</button>
    </div>
    <button class="menu-btn" id="select-play-btn" style="background:linear-gradient(135deg,#a855f7,#6366f1);margin-top:0">▶ START GAME</button>
  </div>

  <!-- PAUSE -->
  <div class="overlay hidden" id="ov-pause">
    <div style="font-size:28px;font-weight:bold;color:#ffd700;margin-bottom:4px;letter-spacing:3px;margin-top:8px">PAUSED</div>
    <div style="color:#888;font-size:11px;margin-bottom:8px">Game is paused</div>
    <button class="menu-btn" id="resume-btn" style="background:linear-gradient(135deg,#22c55e,#15803d)">▶ RESUME</button>
    <button class="menu-btn" id="restart-btn" style="background:linear-gradient(135deg,#457b9d,#1d3557)">↺ RESTART ROUND</button>
    <button class="menu-btn" id="mainmenu-btn" style="background:linear-gradient(135deg,#555,#333)">⌂ MAIN MENU</button>
  </div>

  <!-- GAME OVER -->
  <div class="overlay hidden" id="ov-gameover">
    <div style="font-size:13px;color:#a855f7;margin-bottom:8px;margin-top:20px">GAME OVER</div>
    <div style="font-size:30px;font-weight:bold;color:#ffd700;text-shadow:0 0 20px #ff6b35;margin-bottom:6px" id="go-winner"></div>
    <div style="color:#fff;margin-bottom:8px;font-size:13px" id="go-score"></div>
    <button class="menu-btn" id="again-btn" style="background:linear-gradient(135deg,#a855f7,#6366f1)">↺ PLAY AGAIN</button>
    <button class="menu-btn" id="go-menu-btn" style="background:linear-gradient(135deg,#555,#333)">⌂ MAIN MENU</button>
  </div>
</div>

<div id="controls">
  <div class="dpad">
    <div class="dpad-row">
      <div class="touch-spacer"></div>
      <button class="touch-btn" id="btn-up" style="background:#ffffff15">▲</button>
      <div class="touch-spacer"></div>
    </div>
    <div class="dpad-row">
      <button class="touch-btn" id="btn-left" style="background:#ffffff15">◀</button>
      <button class="touch-btn" id="btn-block" style="background:#ffffff10">🛡</button>
      <button class="touch-btn" id="btn-right" style="background:#ffffff15">▶</button>
    </div>
  </div>
  <div class="ctrl-label"><div style="margin-bottom:20px">MOVE</div><div>ATTACK</div></div>
  <div class="dpad">
    <div class="dpad-row">
      <div class="touch-spacer"></div>
      <button class="touch-btn" id="btn-special" style="background:#a855f740">SP</button>
      <div class="touch-spacer"></div>
    </div>
    <div class="dpad-row">
      <button class="touch-btn" id="btn-punch" style="background:#e6394660">P</button>
      <div class="touch-spacer"></div>
      <button class="touch-btn" id="btn-kick" style="background:#ff6b3560">K</button>
    </div>
  </div>
</div>
<div id="kb-hint">Keyboard: A/D · W jump · J punch · K kick · L special · ; block · Esc pause</div>

<script>
// ════════════════════════════════════════════════════════
//  COLOR PALETTE
// ════════════════════════════════════════════════════════
const PALETTES = [
  { name:"Red",     body:"#e63946", dark:"#c1121f", skin:"#f4a261" },
  { name:"Blue",    body:"#457b9d", dark:"#1d3557", skin:"#f4a261" },
  { name:"Green",   body:"#2d6a4f", dark:"#1b4332", skin:"#f4a261" },
  { name:"Purple",  body:"#7b2d8b", dark:"#4a1259", skin:"#f4a261" },
  { name:"Orange",  body:"#e07c24", dark:"#a85320", skin:"#f4a261" },
  { name:"Cyan",    body:"#0ea5e9", dark:"#0369a1", skin:"#f4a261" },
  { name:"Pink",    body:"#db2777", dark:"#9d174d", skin:"#f4a261" },
  { name:"Yellow",  body:"#ca8a04", dark:"#854d0e", skin:"#f4a261" },
  { name:"Lime",    body:"#65a30d", dark:"#3f6212", skin:"#f4a261" },
  { name:"Indigo",  body:"#4338ca", dark:"#312e81", skin:"#f4a261" },
  { name:"Teal",    body:"#0d9488", dark:"#115e59", skin:"#f4a261" },
  { name:"Rose",    body:"#f43f5e", dark:"#be123c", skin:"#f4a261" },
  { name:"Slate",   body:"#64748b", dark:"#334155", skin:"#f4a261" },
  { name:"Amber",   body:"#d97706", dark:"#92400e", skin:"#f4a261" },
  { name:"Emerald", body:"#059669", dark:"#065f46", skin:"#f4a261" },
  { name:"Violet",  body:"#8b5cf6", dark:"#5b21b6", skin:"#f4a261" },
  { name:"Fuchsia", body:"#c026d3", dark:"#7e22ce", skin:"#f4a261" },
  { name:"Copper",  body:"#b45309", dark:"#78350f", skin:"#f4a261" },
  { name:"Navy",    body:"#1e3a5f", dark:"#0f1f33", skin:"#f4a261" },
  { name:"Crimson", body:"#991b1b", dark:"#7f1d1d", skin:"#f4a261" },
];

let selectedP1 = 0; // index into PALETTES
let selectedP2 = 1;

// ════════════════════════════════════════════════════════
//  SONGS
// ════════════════════════════════════════════════════════
const SONGS = [
  {
    name: "Street Fighter",
    desc: "Fast chiptune — aggressive energy",
    bpm: 160,
    bass:    [110,110,130,110, 98,98,110,98, 87,87,98,87, 82,87,98,110],
    melody:  [440,0,440,0,523,0,494,440, 392,0,440,0,494,523,494,440, 349,0,392,0,440,0,440,494, 523,0,494,0,440,494,523,0],
    chords:  [[220,277,330],[196,247,294],[175,220,262],[165,208,247]],
    bassType:"square", melType:"triangle",
    hasDrums:true, hasHihat:true,
  },
  {
    name: "Night City Brawl",
    desc: "Slower, darker — synthwave groove",
    bpm: 110,
    bass:    [73,73,82,73, 65,65,73,82, 87,87,73,65, 73,82,87,73],
    melody:  [293,0,329,0,369,0,329,293, 261,0,293,0,329,0,261,0, 220,0,246,0,261,0,246,220, 196,0,220,0,246,0,196,0],
    chords:  [[146,184,220],[130,164,196],[116,146,174],[110,138,165]],
    bassType:"sawtooth", melType:"sine",
    hasDrums:true, hasHihat:false, slowHat:true,
  },
  {
    name: "Hyper Kombat",
    desc: "Breakneck speed — pure chaos",
    bpm: 200,
    bass:    [130,130,146,130, 116,116,130,146, 110,130,146,155, 146,130,116,110],
    melody:  [523,523,587,0,659,0,587,523, 494,0,523,0,587,659,587,0, 440,494,523,0,587,0,523,494, 440,0,494,523,440,0,392,0],
    chords:  [[261,329,392],[246,311,369],[220,277,330],[207,261,311]],
    bassType:"square", melType:"square",
    hasDrums:true, hasHihat:true, extraPerc:true,
  },
  {
    name: "Dojo Dawn",
    desc: "Melodic & motivating — epic feel",
    bpm: 128,
    bass:    [82,82,87,82, 73,73,82,87, 65,65,73,82, 73,87,98,87],
    melody:  [329,0,369,415,440,0,415,369, 329,0,311,0,329,369,329,0, 293,0,329,0,369,415,440,0, 415,369,329,311,293,0,261,0],
    chords:  [[164,207,246],[146,184,220],[130,164,196],[155,196,233]],
    bassType:"triangle", melType:"triangle",
    hasDrums:true, hasHihat:true, warmth:true,
  },
  {
    name: "Pixel Punch",
    desc: "8-bit retro — classic arcade vibes",
    bpm: 145,
    bass:    [98,98,110,0, 98,87,0,87, 82,82,87,0, 82,87,98,0],
    melody:  [392,0,0,440,0,494,0,523, 0,587,0,523,494,0,440,0, 392,0,369,0,415,0,369,392, 349,0,0,392,0,349,0,329],
    chords:  [[196,247,294],[175,220,262],[185,233,277],[165,208,247]],
    bassType:"square", melType:"square",
    hasDrums:true, hasHihat:true, staccato:true,
  },
];

let selectedSong = 0;

// ════════════════════════════════════════════════════════
//  AUDIO ENGINE
// ════════════════════════════════════════════════════════
let audioCtx = null;
let musicEnabled = true;
let musicPlaying = false;
let musicTimer = null;
let masterGainNode = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function scheduleNote(ac, comp, freq, type, start, dur, vol) {
  if (!musicPlaying || !freq) return;
  try {
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = type; osc.frequency.value = freq;
    osc.connect(g); g.connect(comp);
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.01);
    g.gain.setValueAtTime(vol, start + dur * 0.65);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    osc.start(start); osc.stop(start + dur + 0.02);
  } catch(e) {}
}

function scheduleNoise(ac, comp, start, dur, vol, minFreq) {
  if (!musicPlaying) return;
  try {
    const buf = ac.createBuffer(1, Math.ceil(ac.sampleRate * dur), ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource();
    const g = ac.createGain();
    const filt = ac.createBiquadFilter();
    filt.type = 'highpass'; filt.frequency.value = minFreq || 4000;
    src.buffer = buf; src.connect(filt); filt.connect(g); g.connect(comp);
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    src.start(start); src.stop(start + dur + 0.02);
  } catch(e) {}
}

function startMusic(songIndex) {
  stopMusic();
  if (!musicEnabled) return;
  const song = SONGS[songIndex !== undefined ? songIndex : selectedSong];
  try {
    const ac = getAudio();
    musicPlaying = true;
    const BEAT = 60 / song.bpm;
    let step = 0, melStep = 0, chordStep = 0, beat = 0;

    const master = ac.createGain();
    master.gain.value = 0.2;
    master.connect(ac.destination);
    masterGainNode = master;

    const comp = ac.createDynamicsCompressor();
    comp.threshold.value = -16; comp.ratio.value = 4;
    comp.connect(master);

    function tick() {
      if (!musicPlaying) return;
      const now = ac.currentTime;
      const staccatoDur = song.staccato ? 0.4 : 0.85;

      // Bass
      const bf = song.bass[step % song.bass.length];
      if (bf) scheduleNote(ac, comp, bf, song.bassType, now, BEAT * staccatoDur, 0.55);
      if (Math.random() < 0.25 && bf) scheduleNote(ac, comp, bf * 2, song.bassType, now + BEAT * 0.5, BEAT * 0.3, 0.12);

      // Melody
      const mf = song.melody[melStep % song.melody.length];
      if (mf) {
        const melDur = song.staccato ? BEAT * 0.35 : BEAT * 0.6;
        scheduleNote(ac, comp, mf, song.melType, now, melDur, song.warmth ? 0.28 : 0.32);
      }
      melStep++;

      // Chords every 4 beats
      if (beat % 4 === 0) {
        const chord = song.chords[chordStep % song.chords.length];
        chord.forEach(f => scheduleNote(ac, comp, f, 'sawtooth', now, BEAT * 0.28, song.warmth ? 0.09 : 0.11));
        chordStep++;
      }

      // Drums
      if (song.hasDrums) {
        const isHeavy = song.bpm >= 180;
        // Kick: beats 0 and 2 (plus extra for hyper)
        if (beat % 4 === 0 || beat % 4 === 2 || (song.extraPerc && beat % 2 === 0)) {
          scheduleNote(ac, comp, 55, 'sine', now, 0.14, 0.85);
          scheduleNote(ac, comp, 110, 'sine', now, 0.04, 0.4);
          scheduleNoise(ac, comp, now, 0.03, 0.25, 200);
        }
        // Snare: beats 1 and 3
        if (beat % 4 === 1 || beat % 4 === 3) {
          scheduleNoise(ac, comp, now, 0.12, song.warmth ? 0.3 : 0.42, 1800);
          scheduleNote(ac, comp, 180, 'sine', now, 0.07, 0.18);
        }
        // Hi-hat
        if (song.hasHihat) {
          scheduleNoise(ac, comp, now, 0.035, 0.22, 8000);
          if (beat % 2 === 0) scheduleNoise(ac, comp, now + BEAT * 0.5, 0.025, 0.10, 10000);
        }
        if (song.slowHat) {
          if (beat % 2 === 0) scheduleNoise(ac, comp, now, 0.06, 0.18, 5000);
        }
        if (song.extraPerc && beat % 8 === 6) {
          scheduleNoise(ac, comp, now + BEAT * 0.25, 0.05, 0.3, 3000);
          scheduleNoise(ac, comp, now + BEAT * 0.75, 0.05, 0.2, 3000);
        }
      }

      step++; beat++;
      musicTimer = setTimeout(tick, BEAT * 1000 - 12);
    }
    tick();
  } catch(e) { musicPlaying = false; }
}

function stopMusic() {
  musicPlaying = false;
  if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; }
  if (masterGainNode) {
    try { masterGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3); } catch(e) {}
    setTimeout(() => { try { masterGainNode.disconnect(); } catch(e) {} masterGainNode = null; }, 400);
  }
}

// SFX
function playTone(freq, type, dur, vol=0.3, delay=0) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator(), g = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type = type; osc.frequency.setValueAtTime(freq, ac.currentTime + delay);
    g.gain.setValueAtTime(vol, ac.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + dur);
    osc.start(ac.currentTime + delay); osc.stop(ac.currentTime + delay + dur + 0.01);
  } catch(e) {}
}
function playNoise(dur, vol=0.15, minFreq=1200) {
  try {
    const ac = getAudio();
    const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
    const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource(), g = ac.createGain(), filt = ac.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = minFreq; filt.Q.value = 0.5;
    src.buffer = buf; src.connect(filt); filt.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    src.start(); src.stop(ac.currentTime + dur + 0.01);
  } catch(e) {}
}

const GROUND_Y=300, CHAR_WIDTH=60, CHAR_HEIGHT=90;
const GRAVITY=0.6, JUMP_FORCE=-14, MOVE_SPEED=4;
const MAX_HEALTH=100, ROUND_TIME=60;
const ATTACKS={
  punch:  {damage:8, range:85, duration:14,cooldown:16,knockback:3,color:"#ffd700"},
  kick:   {damage:12,range:105,duration:18,cooldown:20,knockback:5,color:"#ff6b35"},
  special:{damage:20,range:135,duration:26,cooldown:30,knockback:8,color:"#a855f7"},
};

function initFighter(x,facing){
  return{x,y:GROUND_Y,vx:0,vy:0,health:MAX_HEALTH,facing,
         state:"idle",stateTimer:0,blocking:false,onGround:true,
         hitFlash:0,attackType:null,attackCooldown:0,hitLanded:false};
}
function initBot(){return{actionTimer:0,action:"approach",blockTimer:0,aggressionCooldown:0};}

const G={
  p1:initFighter(150,"right"), p2:initFighter(580,"left"),
  bot:initBot(), effects:[],
  gameState:"title", paused:false, cpuEnabled:true,
  timer:ROUND_TIME, timerTick:0,
  prevKeys:new Set(), prevBtns:{},
  screenShake:0,

};

// ════════════════════════════════════════════════════════
//  BOT AI
// ════════════════════════════════════════════════════════
function updateBot(){
  const bot=G.bot,p2=G.p2,p1=G.p1;
  const dist=Math.abs(p2.x-p1.x);
  const canAct=p2.state!=="attack"&&p2.state!=="hit";
  let left=false,right=false,jump=false,block=false,punch=false,kick=false,special=false;
  if(bot.actionTimer>0)bot.actionTimer--;
  if(bot.aggressionCooldown>0)bot.aggressionCooldown--;
  if(bot.blockTimer>0){bot.blockTimer--;block=true;}
  if(p2.hitFlash>0&&bot.blockTimer<=0&&Math.random()<0.25)bot.blockTimer=18+Math.floor(Math.random()*18);
  const isLow=p2.health<30,oppLow=p1.health<30;
  if(bot.actionTimer<=0&&!block){
    const r=Math.random();
    if(dist>200){bot.action="approach";bot.actionTimer=20+Math.floor(Math.random()*30);}
    else if(dist<60){bot.action=r<0.5?"attack":"retreat";bot.actionTimer=r<0.5?8:20;}
    else{
      if(r<0.45){bot.action="attack";bot.actionTimer=12;}
      else if(r<0.6){bot.action="retreat";bot.actionTimer=25;}
      else if(r<0.75){bot.action="approach";bot.actionTimer=20;}
      else{bot.action="wait";bot.actionTimer=15;}
    }
    if(Math.random()<0.08&&p2.onGround)jump=true;
    if(Math.random()<0.08&&bot.blockTimer<=0)bot.blockTimer=15;
  }
  if(!block){
    const md=p2.x>p1.x?-1:1;
    if(bot.action==="approach"&&canAct){md>0?right=true:left=true;}
    else if(bot.action==="retreat"&&canAct){md>0?left=true:right=true;}
    else if(bot.action==="attack"&&canAct&&bot.aggressionCooldown<=0){
      if(dist<ATTACKS.special.range&&Math.random()<(isLow?0.05:0.10)){special=true;bot.aggressionCooldown=40;}
      else if(dist<ATTACKS.kick.range&&Math.random()<0.35){kick=true;bot.aggressionCooldown=20;}
      else if(dist<ATTACKS.punch.range&&Math.random()<0.5){punch=true;bot.aggressionCooldown=12;}
      else{md>0?right=true:left=true;}
    }
    if(isLow&&dist<ATTACKS.special.range&&canAct&&bot.aggressionCooldown<=0&&Math.random()<0.04){special=true;bot.aggressionCooldown=35;}
    if(oppLow&&dist<ATTACKS.kick.range&&canAct&&bot.aggressionCooldown<=0&&Math.random()<0.18){kick=true;bot.aggressionCooldown=15;}
  }
  return{left,right,jump,block,punch,kick,special};
}

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;

function drawFighterOn(targetCtx, f, colors, label, ox, oy, scale) {
  const {x,y,facing,state,hitFlash,blocking,stateTimer,attackType}=f;
  const dir=facing==="right"?1:-1;
  targetCtx.save();
  if(ox!==undefined) targetCtx.translate(ox,oy);
  if(scale) targetCtx.scale(scale,scale);
  targetCtx.translate(x+CHAR_WIDTH/2,y);
  if(hitFlash>0)targetCtx.globalAlpha=0.55+Math.sin(hitFlash*1.2)*0.45;
  const bob=state==="idle"?Math.sin(Date.now()/300)*2:0;
  const walkBob=state==="walk"?Math.sin(Date.now()/150)*4:0;
  const totalBob=bob+walkBob;
  const isAtt=state==="attack";
  const atkDur=isAtt?ATTACKS[attackType||"punch"].duration:1;
  const atkT=isAtt?(1-stateTimer/atkDur):0;
  const swing=isAtt?Math.sin(atkT*Math.PI):0;
  const scaleY=f.vy<-5?1.1:f.vy>5?0.9:1;
  const scaleX=f.vy<-5?0.9:f.vy>5?1.1:1;
  targetCtx.scale(dir,1);targetCtx.scale(scaleX,scaleY);
  targetCtx.lineCap="round";targetCtx.lineJoin="round";
  // Shadow
  targetCtx.save();targetCtx.scale(1,1/scaleY);
  targetCtx.beginPath();targetCtx.ellipse(0,GROUND_Y-y+5+CHAR_HEIGHT,20,6,0,0,Math.PI*2);
  targetCtx.fillStyle="rgba(0,0,0,0.3)";targetCtx.fill();targetCtx.restore();
  const lp=state==="walk"?Date.now()/150:0;
  const wsL=state==="walk"?Math.sin(lp)*12:0;
  const wsR=state==="walk"?-Math.sin(lp)*12:0;
  const isKick=isAtt&&attackType==="kick";
  const isSpec=isAtt&&attackType==="special";
  const isPunch=isAtt&&attackType==="punch";
  let kkX=0,kkY=0,kfX=0,kfY=0;
  if(isKick||isSpec){const kr=Math.min(swing*2,1),fe=Math.max(swing*2-1,0);kkX=kr*10;kkY=totalBob+55-kr*35;kfX=kkX+fe*45;kfY=kkY+fe*20;}
  // Back leg
  targetCtx.beginPath();targetCtx.moveTo(-8,totalBob+40);targetCtx.lineTo(-8+wsR,totalBob+CHAR_HEIGHT);
  targetCtx.lineWidth=10;targetCtx.strokeStyle=colors.dark;targetCtx.stroke();
  // Front leg
  if(isKick||isSpec){
    targetCtx.beginPath();targetCtx.moveTo(8,totalBob+40);targetCtx.lineTo(kkX,kkY);targetCtx.lineWidth=10;targetCtx.strokeStyle=colors.body;targetCtx.stroke();
    targetCtx.beginPath();targetCtx.moveTo(kkX,kkY);targetCtx.lineTo(kfX,kfY);targetCtx.lineWidth=9;targetCtx.strokeStyle=colors.body;targetCtx.stroke();
    targetCtx.beginPath();targetCtx.arc(kfX,kfY,8,0,Math.PI*2);targetCtx.fillStyle=colors.dark;
    if(swing>0.4){targetCtx.shadowColor=ATTACKS.kick.color;targetCtx.shadowBlur=14*swing;}
    targetCtx.fill();targetCtx.shadowBlur=0;
  } else {
    targetCtx.beginPath();targetCtx.moveTo(8,totalBob+40);targetCtx.lineTo(8+wsL,totalBob+CHAR_HEIGHT);targetCtx.lineWidth=10;targetCtx.strokeStyle=colors.body;targetCtx.stroke();
  }
  // Torso
  targetCtx.beginPath();targetCtx.roundRect(-16,totalBob+10,32,35,6);targetCtx.fillStyle=blocking?colors.dark:colors.body;targetCtx.fill();
  targetCtx.beginPath();targetCtx.rect(-16,totalBob+38,32,6);targetCtx.fillStyle="#ffd700";targetCtx.fill();
  // Head
  targetCtx.beginPath();targetCtx.arc(0,totalBob-2,16,0,Math.PI*2);targetCtx.fillStyle=colors.skin;targetCtx.fill();targetCtx.strokeStyle=colors.dark;targetCtx.lineWidth=2;targetCtx.stroke();
  targetCtx.beginPath();targetCtx.arc(5,totalBob-4,3,0,Math.PI*2);targetCtx.fillStyle="#1a1a2e";targetCtx.fill();
  targetCtx.beginPath();targetCtx.arc(5,totalBob-4,1.5,0,Math.PI*2);targetCtx.fillStyle="#fff";targetCtx.fill();
  targetCtx.beginPath();
  if(f.health<30)targetCtx.arc(2,totalBob+4,5,0.2,Math.PI-0.2);else targetCtx.arc(2,totalBob+2,5,-Math.PI+0.2,-0.2);
  targetCtx.strokeStyle="#1a1a2e";targetCtx.lineWidth=1.5;targetCtx.stroke();
  // Arms
  if(isPunch){
    const jab=swing*42;
    targetCtx.beginPath();targetCtx.moveTo(-10,totalBob+18);targetCtx.lineTo(-22,totalBob+38);targetCtx.lineWidth=8;targetCtx.strokeStyle=colors.dark;targetCtx.stroke();
    targetCtx.beginPath();targetCtx.moveTo(10,totalBob+18);targetCtx.lineTo(10+jab,totalBob+20);targetCtx.lineWidth=8;targetCtx.strokeStyle=colors.body;targetCtx.stroke();
    targetCtx.beginPath();targetCtx.arc(10+jab,totalBob+20,8,0,Math.PI*2);targetCtx.fillStyle=colors.skin;
    if(swing>0.3){targetCtx.shadowColor=ATTACKS.punch.color;targetCtx.shadowBlur=16*swing;}
    targetCtx.fill();targetCtx.shadowBlur=0;
    if(swing>0.35){for(let i=0;i<4;i++){const o=i*10;targetCtx.beginPath();targetCtx.moveTo(10+jab-20-o,totalBob+15+i*2);targetCtx.lineTo(10+jab-8-o,totalBob+15+i*2);targetCtx.strokeStyle=`rgba(255,215,0,${0.7-i*0.15})`;targetCtx.lineWidth=2;targetCtx.stroke();}}
  } else if(isSpec){
    const rise=swing,upX=10+rise*30,upY=totalBob+18-rise*50;
    targetCtx.beginPath();targetCtx.moveTo(-10,totalBob+18);targetCtx.lineTo(-24,totalBob+30+rise*10);targetCtx.lineWidth=8;targetCtx.strokeStyle=colors.dark;targetCtx.stroke();
    targetCtx.beginPath();targetCtx.moveTo(10,totalBob+18);targetCtx.lineTo(upX,upY);targetCtx.lineWidth=8;targetCtx.strokeStyle=colors.body;targetCtx.stroke();
    targetCtx.beginPath();targetCtx.arc(upX,upY,9,0,Math.PI*2);targetCtx.fillStyle=colors.skin;targetCtx.shadowColor=ATTACKS.special.color;targetCtx.shadowBlur=20*rise;targetCtx.fill();targetCtx.shadowBlur=0;
    for(let i=0;i<4;i++){const rt=(atkT+i/4)%1,r=rt*40;targetCtx.beginPath();targetCtx.arc(upX,upY,r+8,0,Math.PI*2);targetCtx.strokeStyle=`rgba(168,85,247,${(1-rt)*0.8})`;targetCtx.lineWidth=3;targetCtx.stroke();}
  } else if(isKick){
    targetCtx.beginPath();targetCtx.moveTo(-10,totalBob+18);targetCtx.lineTo(-24+swing*10,totalBob+28-swing*8);targetCtx.lineWidth=8;targetCtx.strokeStyle=colors.dark;targetCtx.stroke();
    targetCtx.beginPath();targetCtx.moveTo(10,totalBob+18);targetCtx.lineTo(22-swing*15,totalBob+26+swing*5);targetCtx.lineWidth=8;targetCtx.strokeStyle=colors.body;targetCtx.stroke();
  } else if(blocking){
    targetCtx.beginPath();targetCtx.moveTo(-10,totalBob+18);targetCtx.lineTo(18,totalBob+8);targetCtx.lineWidth=8;targetCtx.strokeStyle=colors.dark;targetCtx.stroke();
    targetCtx.beginPath();targetCtx.moveTo(10,totalBob+18);targetCtx.lineTo(18,totalBob+8);targetCtx.lineWidth=8;targetCtx.strokeStyle=colors.body;targetCtx.stroke();
    targetCtx.beginPath();targetCtx.arc(18,totalBob+8,22,-Math.PI/2,Math.PI/2);targetCtx.strokeStyle="rgba(100,200,255,0.5)";targetCtx.lineWidth=4;targetCtx.stroke();
  } else {
    targetCtx.beginPath();targetCtx.moveTo(-10,totalBob+18);targetCtx.lineTo(-20+wsL*0.5,totalBob+38);targetCtx.lineWidth=8;targetCtx.strokeStyle=colors.dark;targetCtx.stroke();
    targetCtx.beginPath();targetCtx.moveTo(10,totalBob+18);targetCtx.lineTo(20+wsR*0.5,totalBob+38);targetCtx.lineWidth=8;targetCtx.strokeStyle=colors.body;targetCtx.stroke();
    targetCtx.beginPath();targetCtx.arc(20+wsR*0.5,totalBob+38,5,0,Math.PI*2);targetCtx.fillStyle=colors.skin;targetCtx.fill();
  }
  // Name tag
  targetCtx.scale(dir,1);
  targetCtx.fillStyle="rgba(0,0,0,0.7)";targetCtx.fillRect(-20,totalBob-28,40,14);
  targetCtx.fillStyle="#fff";targetCtx.font="bold 9px monospace";targetCtx.textAlign="center";
  targetCtx.fillText(label,0,totalBob-17);
  targetCtx.restore();
}

function drawEffects(){
  G.effects.forEach(e=>{
    const t=e.life/e.maxLife;
    ctx.save();ctx.globalAlpha=t;ctx.translate(e.x,e.y);
    if(e.type==="spark"){const r=(1-t)*e.size;for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);ctx.strokeStyle=e.color;ctx.lineWidth=2;ctx.stroke();}}
    else if(e.type==="block"){const r=(1-t)*e.size;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.strokeStyle=e.color;ctx.lineWidth=3;ctx.stroke();ctx.font="bold 11px monospace";ctx.fillStyle=e.color;ctx.textAlign="center";ctx.fillText(e.text,0,-r-4);}
    else{const ex=1-t;ctx.beginPath();ctx.arc(0,0,ex*18+4,0,Math.PI*2);ctx.fillStyle=e.color;ctx.globalAlpha=t*0.35;ctx.fill();ctx.globalAlpha=t;for(let i=0;i<10;i++){const a=(i/10)*Math.PI*2;ctx.beginPath();ctx.moveTo(Math.cos(a)*6,Math.sin(a)*6);ctx.lineTo(Math.cos(a)*ex*e.size*0.5,Math.sin(a)*ex*e.size*0.5);ctx.strokeStyle=e.color;ctx.lineWidth=i%2===0?3:1.5;ctx.stroke();}if(e.text){const fy=-(1-t)*35-10;ctx.font=`bold ${16+(1-t)*6}px monospace`;ctx.fillStyle="#fff";ctx.shadowColor=e.color;ctx.shadowBlur=8;ctx.textAlign="center";ctx.fillText(e.text,0,fy);ctx.shadowBlur=0;}}
    ctx.restore();
  });
}

function drawBG(){
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,"#0f0c29");grad.addColorStop(0.5,"#302b63");grad.addColorStop(1,"#24243e");
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  ctx.fillStyle="rgba(255,255,255,0.6)";
  [17,31,47,61,79,83,97,113,127,139,151,163,179,191,211].forEach((s,i)=>{ctx.beginPath();ctx.arc((s*37+i*53)%W,(s*23+i*41)%(H*0.5),1,0,Math.PI*2);ctx.fill();});
  ctx.beginPath();ctx.arc(W-80,50,30,0,Math.PI*2);ctx.fillStyle="#ffeaa7";ctx.fill();
  ctx.beginPath();ctx.arc(W-68,44,25,0,Math.PI*2);ctx.fillStyle="#302b63";ctx.fill();
  ctx.fillStyle="#1a1535";
  for(let i=0;i<20;i++){const bx=(i*47+13)%(W-20),bh=30+(i*31+7)%60;ctx.fillRect(bx,H*0.45-bh,20+(i*13)%20,bh);}
  const gGrad=ctx.createLinearGradient(0,GROUND_Y+CHAR_HEIGHT,0,H);

  ctx.beginPath();ctx.moveTo(0,GROUND_Y+CHAR_HEIGHT);ctx.lineTo(W,GROUND_Y+CHAR_HEIGHT);

  ctx.strokeStyle="rgba(168,85,247,0.15)";ctx.lineWidth=1;
  for(let i=0;i<W;i+=40){ctx.beginPath();ctx.moveTo(i,GROUND_Y+CHAR_HEIGHT);ctx.lineTo(i,H);ctx.stroke();}
}

function drawPreviewFighter(targetCtx, colors, facing) {
  const dummy = { x:0, y:GROUND_Y, vx:0, vy:0, health:100, facing,
                  state:"idle", stateTimer:0, blocking:false, onGround:true,
                  hitFlash:0, attackType:null, attackCooldown:0, hitLanded:false };
  const cw = targetCtx.canvas.width, ch = targetCtx.canvas.height;
  targetCtx.clearRect(0, 0, cw, ch);
  // mini background
  const g = targetCtx.createLinearGradient(0,0,0,ch);
  g.addColorStop(0,"#1a1535"); g.addColorStop(1,"#0f0c29");
  targetCtx.fillStyle=g; targetCtx.fillRect(0,0,cw,ch);
  // ground line
  const sc = cw / 120;
  const gy = ch - 10;
  targetCtx.strokeStyle="#a855f7"; targetCtx.lineWidth=1;
  targetCtx.beginPath(); targetCtx.moveTo(0,gy); targetCtx.lineTo(cw,gy); targetCtx.stroke();
  // Draw fighter scaled/offset to fit preview
  dummy.x = 10; dummy.y = GROUND_Y;
  const scale = cw / 120;
  const offX = -dummy.x - CHAR_WIDTH/2 + cw/(2*scale);
  const offY = -(dummy.y + CHAR_HEIGHT) + gy/scale;
  targetCtx.save();
  targetCtx.scale(scale, scale);
  targetCtx.translate(offX, offY);
  drawFighterOn(targetCtx, dummy, colors, "", undefined, undefined, undefined);
  targetCtx.restore();
}

function buildCustomizeScreen() {
  // Build color swatches
  ['p1','p2'].forEach(player => {
    const grid = document.getElementById(`swatches-${player}`);
    grid.innerHTML = '';
    PALETTES.forEach((pal, i) => {
      const sw = document.createElement('div');
      sw.className = 'color-swatch' + (i === (player==='p1'?selectedP1:selectedP2) ? ' selected' : '');
      sw.style.background = pal.body;
      sw.title = pal.name;
      sw.addEventListener('click', () => {
        if (player==='p1') selectedP1=i; else selectedP2=i;
        grid.querySelectorAll('.color-swatch').forEach((s,j) => s.classList.toggle('selected', j===i));
        refreshPreviews();
      });
      grid.appendChild(sw);
    });
  });

  // Song list
  const songList = document.getElementById('song-list');
  songList.innerHTML = '';
  SONGS.forEach((song, i) => {
    const btn = document.createElement('button');
    btn.className = 'song-btn' + (i === selectedSong ? ' selected' : '');
    btn.innerHTML = `<div class="song-name">${song.name}</div><div class="song-desc">${song.desc}</div>`;
    btn.addEventListener('click', () => {
      selectedSong = i;
      songList.querySelectorAll('.song-btn').forEach((b,j) => b.classList.toggle('selected', j===i));
    });
    songList.appendChild(btn);
  });

  refreshPreviews();
}

//  HIT / GAME LOGIC

function spawnHit(attacker, defender, type) {
  const atk=ATTACKS[type];
  const hitX=defender.x+CHAR_WIDTH/2, hitY=defender.y+(type==="kick"?50:20);
  if(defender.blocking){G.effects.push({x:hitX,y:hitY,color:"#74b3ce",text:"BLOCK",size:30,life:25,maxLife:25,type:"block"});sfxBlock();return;}
  const dmg=atk.damage;
  defender.health=Math.max(0,defender.health-dmg);
  defender.hitFlash=14;defender.state="hit";
  defender.stateTimer=type==="special"?18:type==="kick"?13:9;
  defender.vx=attacker.facing==="right"?atk.knockback:-atk.knockback;
  defender.vy=type==="special"?-5:type==="kick"?-3:-1.5;
  G.screenShake=type==="special"?10:type==="kick"?6:3;
  G.effects.push({x:hitX,y:hitY,color:atk.color,text:`${dmg}!`,size:55+dmg*1.5,life:40,maxLife:40,type:"hit"});
  const sparks=type==="special"?5:type==="kick"?3:0;
  for(let s=0;s<sparks;s++)G.effects.push({x:hitX+(Math.random()-0.5)*30,y:hitY+(Math.random()-0.5)*20,color:atk.color,text:"",size:20+Math.random()*20,life:20+s*4,maxLife:20+s*4,type:"spark"});
  if(type==="special")sfxSpecial();else if(type==="kick")sfxKick();else sfxPunch();
}

function updateFighter(f,opp,inp){
  if(f.x<opp.x)f.facing="right";else f.facing="left";
  if(f.stateTimer>0)f.stateTimer--;
  if(f.hitFlash>0)f.hitFlash--;
  if(f.attackCooldown>0)f.attackCooldown--;
  const canAct=f.state!=="attack"&&f.state!=="hit";
  f.blocking=inp.block&&canAct&&f.onGround;
  if(canAct&&!f.blocking&&f.attackCooldown<=0){
    let atk=null;
    if(inp.special)atk="special";else if(inp.kick)atk="kick";else if(inp.punch)atk="punch";
    if(atk){f.state="attack";f.attackType=atk;f.stateTimer=ATTACKS[atk].duration;f.attackCooldown=ATTACKS[atk].cooldown;f.hitLanded=false;}
  }
  if(f.state==="attack"&&!f.hitLanded){
    const dur=ATTACKS[f.attackType].duration,prog=1-(f.stateTimer/dur);
    if(prog>0.25&&prog<0.75&&Math.abs(f.x-opp.x)<ATTACKS[f.attackType].range){f.hitLanded=true;spawnHit(f,opp,f.attackType);}
  }
  if(canAct&&!f.blocking){
    if(inp.left){f.vx=-MOVE_SPEED;if(f.onGround)f.state="walk";}
    else if(inp.right){f.vx=MOVE_SPEED;if(f.onGround)f.state="walk";}
    else{f.vx*=0.7;if(f.onGround&&f.state==="walk")f.state="idle";}
  }else if(f.state==="hit")f.vx*=0.8;
  if(inp.jump&&f.onGround&&canAct){f.vy=JUMP_FORCE;f.onGround=false;f.state="jump";}
  f.vy+=GRAVITY;f.y+=f.vy;f.x+=f.vx;
  if(f.y>=GROUND_Y){f.y=GROUND_Y;f.vy=0;f.onGround=true;if(f.state==="jump"||f.state==="hit")f.state="idle";}
  f.x=Math.max(20,Math.min(W-CHAR_WIDTH-20,f.x));
  if(f.state==="attack"&&f.stateTimer<=0)f.state="idle";
  if(f.state==="hit"&&f.stateTimer<=0)f.state="idle";
}

function announce(text,dur=90){G.announceText=text;G.announceTimer=dur;}

function updateHUD(){
  const hpColor=hp=>hp>50?"#22c55e":hp>25?"#eab308":"#ef4444";
  const p1f=document.getElementById('p1fill');
  p1f.style.width=G.p1.health+"%";p1f.style.background=hpColor(G.p1.health);p1f.style.boxShadow=`0 0 8px ${hpColor(G.p1.health)}`;
  const p2f=document.getElementById('p2fill');
  p2f.style.width=G.p2.health+"%";p2f.style.background=hpColor(G.p2.health);p2f.style.boxShadow=`0 0 8px ${hpColor(G.p2.health)}`;
  document.getElementById('timer-val').textContent=G.timer;
  document.getElementById('round-label').textContent=`RND ${G.round}`;
  document.getElementById('p1stars').textContent="★".repeat(G.p1Wins)+"☆".repeat(2-G.p1Wins);
  document.getElementById('p2stars').textContent="★".repeat(G.p2Wins)+"☆".repeat(2-G.p2Wins);
  // Update P1 HUD name color to match chosen color
  document.getElementById('p1name').style.color = PALETTES[selectedP1].body;
}

function showOverlay(id){
  ["ov-title","ov-select","ov-pause","ov-gameover"].forEach(x=>{
    document.getElementById(x).classList.toggle("hidden",x!==id);
  });
}

function startRound(){
  G.p1=initFighter(150,"right");G.p2=initFighter(580,"left");
  G.bot=initBot();G.effects=[];
  G.timer=ROUND_TIME;G.timerTick=0;
  G.paused=false;G.gameState="fight";
  G.prevKeys=new Set();G.prevBtns={};
  showOverlay(null);
  if(musicEnabled)startMusic(selectedSong);
  sfxFight();
  announce("FIGHT!",60);
}

function endRound(winner){
  G.gameState="roundEnd";G.winner=winner;
  if(winner==="P1")G.p1Wins++;else if(winner==="P2")G.p2Wins++;
  sfxKO();
  if(winner==="P1")announce("K.O.! YOU WIN!",180);
  else if(winner==="P2")announce("K.O.! CPU WINS!",180);
  else announce("DRAW!",180);
}

// ════════════════════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════════════════════
const keys=new Set();
const touchState={};
window.addEventListener('keydown',e=>{
  keys.add(e.code);
  if(e.code==="Escape")togglePause();
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();
});
window.addEventListener('keyup',e=>keys.delete(e.code));
const touchMap={'btn-left':'left','btn-right':'right','btn-up':'up','btn-block':'block','btn-punch':'punch','btn-kick':'kick','btn-special':'special'};
Object.entries(touchMap).forEach(([id,name])=>{
  const el=document.getElementById(id);
  el.addEventListener('pointerdown',e=>{e.preventDefault();el.setPointerCapture(e.pointerId);touchState[name]=true;});
  el.addEventListener('pointerup',e=>{e.preventDefault();touchState[name]=false;});
  el.addEventListener('pointercancel',e=>{e.preventDefault();touchState[name]=false;});
});
window.addEventListener('pointerup',()=>Object.keys(touchState).forEach(k=>touchState[k]=false));
window.addEventListener('pointercancel',()=>Object.keys(touchState).forEach(k=>touchState[k]=false));

// ════════════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════════════
let prevBtns={};
function loop(){
  if(G.gameState==="fight"&&!G.paused){
    G.timerTick++;
    if(G.timerTick>=60){G.timerTick=0;G.timer--;if(G.timer<=0){const w=G.p1.health>=G.p2.health?"P1":G.p2.health>=G.p1.health?"P2":"DRAW";endRound(w);}}
    const p1punch=(keys.has("KeyJ")&&!G.prevKeys.has("KeyJ"))||(touchState.punch&&!prevBtns.punch);
    const p1kick=(keys.has("KeyK")&&!G.prevKeys.has("KeyK"))||(touchState.kick&&!prevBtns.kick);
    const p1special=(keys.has("KeyL")&&!G.prevKeys.has("KeyL"))||(touchState.special&&!prevBtns.special);
    G.prevKeys=new Set(keys);
    prevBtns={punch:touchState.punch,kick:touchState.kick,special:touchState.special};
    if(G.screenShake>0)G.screenShake--;
    const p1inp={left:keys.has("KeyA")||touchState.left,right:keys.has("KeyD")||touchState.right,jump:keys.has("KeyW")||touchState.up,block:keys.has("Semicolon")||touchState.block,punch:p1punch,kick:p1kick,special:p1special};
    const botInp=G.cpuEnabled?updateBot():{left:false,right:false,jump:false,block:false,punch:false,kick:false,special:false};
    updateFighter(G.p1,G.p2,p1inp);
    updateFighter(G.p2,G.p1,botInp);
    for(let i=G.effects.length-1;i>=0;i--){G.effects[i].life--;if(G.effects[i].life<=0)G.effects.splice(i,1);}
    if(G.p1.health<=0||G.p2.health<=0){
      if(G.p1.health<=0&&G.p2.health<=0)endRound("DRAW");
      else if(G.p1.health<=0)endRound("P2");
      else endRound("P1");
    }
    if(G.announceTimer>0)G.announceTimer--;
  } else if(G.gameState==="roundEnd"){
    if(G.announceTimer>0)G.announceTimer--;
    else{
      if(G.p1Wins>=2||G.p2Wins>=2){
        G.gameState="gameOver";stopMusic();
        document.getElementById('go-winner').textContent=G.p1Wins>=2?"YOU WIN! 🏆":"CPU WINS!";
        document.getElementById('go-score').textContent=`${G.p1Wins} – ${G.p2Wins}`;
        showOverlay("ov-gameover");
      } else {G.round++;sfxRound();startRound();}
    }
  }

  // Draw
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(G.screenShake>0)ctx.translate((Math.random()-0.5)*G.screenShake*1.5,(Math.random()-0.5)*G.screenShake*0.8);
  drawBG();
  drawFighterOn(ctx,G.p1,PALETTES[selectedP1],"YOU");
  drawFighterOn(ctx,G.p2,PALETTES[selectedP2],"CPU");
  drawEffects();
  ctx.restore();
  if(G.announceText&&G.announceTimer>0){
    const alpha=Math.min(1,G.announceTimer/20);
    ctx.save();ctx.globalAlpha=alpha;ctx.translate(W/2,H/2-30);
    ctx.font="bold 48px 'Arial Black',sans-serif";ctx.textAlign="center";
    ctx.fillStyle="#ffd700";ctx.shadowColor="#ff6b35";ctx.shadowBlur=20;
    ctx.fillText(G.announceText,0,0);ctx.restore();
  }
  updateHUD();
  requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════════
//  UI WIRING
// ════════════════════════════════════════════════════════
function togglePause(){
  if(G.gameState!=="fight")return;
  G.paused=!G.paused;
  document.getElementById('menu-btn').textContent=G.paused?"▶ RESUME":"⏸ MENU";
  showOverlay(G.paused?"ov-pause":null);
  if(G.paused)stopMusic();else if(musicEnabled)startMusic(selectedSong);
}
let cpuOn=true;
function toggleCpu(){
  cpuOn=!cpuOn;G.cpuEnabled=cpuOn;
  const btn=document.getElementById('cpu-btn');
  btn.textContent=`CPU: ${cpuOn?"ON":"OFF"}`;
  btn.style.borderColor=cpuOn?"#22c55e":"#ef4444";
  btn.style.color=cpuOn?"#22c55e":"#ef4444";
  btn.style.background=cpuOn?"#1e1e3a":"#2a1a1a";
}

document.getElementById('menu-btn').onclick=togglePause;
document.getElementById('cpu-btn').onclick=toggleCpu;
document.getElementById('start-btn').onclick=()=>{G.p1Wins=0;G.p2Wins=0;G.round=1;startRound();};
document.getElementById('select-btn').onclick=()=>{buildCustomizeScreen();showOverlay("ov-select");};
document.getElementById('select-back-btn').onclick=()=>{stopMusic();showOverlay("ov-title");};
document.getElementById('select-play-btn').onclick=()=>{G.p1Wins=0;G.p2Wins=0;G.round=1;startRound();};
let previewing=false;
document.getElementById('preview-music-btn').onclick=()=>{
  getAudio(); // unlock context
  if(previewing){stopMusic();previewing=false;document.getElementById('preview-music-btn').textContent="▶ PREVIEW";}
  else{previewing=true;document.getElementById('preview-music-btn').textContent="⏹ STOP";startMusic(selectedSong);}
};
document.getElementById('resume-btn').onclick=togglePause;
document.getElementById('restart-btn').onclick=()=>{G.paused=false;showOverlay(null);startRound();};
document.getElementById('mainmenu-btn').onclick=()=>{G.paused=false;G.gameState="title";stopMusic();showOverlay("ov-title");document.getElementById('menu-btn').textContent="⏸ MENU";};
document.getElementById('again-btn').onclick=()=>{G.p1Wins=0;G.p2Wins=0;G.round=1;startRound();};
document.getElementById('go-menu-btn').onclick=()=>{G.gameState="title";stopMusic();showOverlay("ov-title");};

// Refresh previews when song changes (so screen shows current selection)
document.getElementById('song-list')?.addEventListener('click',()=>{
  if(previewing){stopMusic();startMusic(selectedSong);}
});

// Kick off render loop
loop();
</script>
